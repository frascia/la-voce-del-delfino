<!DOCTYPE html><html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Voce del Delfino 🐬</title><style>
:root{
  --blu-mare:#005f73;
  --panna:#faf7f2;
}

body{
  margin:0;
  background:var(--blu-mare);
  font-family:-apple-system,Segoe UI,Roboto;
}

#app{min-height:100vh}

.testata img{
  width:100%;
  max-height:320px;
  object-fit:cover;
}

.menu{
  display:flex;
  gap:10px;
  padding:15px;
  overflow:auto;
}

.tab{
  padding:10px 16px;
  border-radius:20px;
  border:1px solid #fff;
  color:#fff;
  cursor:pointer;
}

.tab.attiva{
  background:#fff;
  color:var(--blu-mare);
}

.notizia{
  background:var(--panna);
  margin:15px;
  padding:18px;
  border-radius:14px;
}

.autore{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  margin-bottom:8px;
}

.autore span{
  font-size:18px;
}

.commenti-header{
  margin-top:10px;
  cursor:pointer;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:8px;
}

.badge-new{
  background:#e63946;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:8px;
}

.commenti-box{
  display:none;
  margin-top:10px;
}

.commento{
  background:#fff;
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
  font-size:13px;
  display:flex;
  gap:8px;
}

.avatar{font-size:20px}
.nome{font-weight:700}
.meta{font-size:10px;color:#888}
</style></head><body>
<div id="app"><div class="testata" id="logo">
<img id="header-img" src="public/images/default.webp">
</div><div class="menu" id="menu"></div>
<div id="lista"></div></div><script>

function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}

async function safeFetch(url){
 try{
  const r=await fetch(url+"?v="+Date.now());
  if(!r.ok) throw new Error();
  return await r.json();
 }catch(e){return null}
}

let CFG=null;

function setHeader(src){
 const img=document.getElementById('header-img');
 img.src='public/images/'+(src||'default.webp');
}

function renderMenu(sezioni){
 const m=document.getElementById('menu');
 m.innerHTML='';
 sezioni.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='tab'+(i===0?' attiva':'');
  b.textContent=s;
  b.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('attiva'));
    b.classList.add('attiva');
    loadSezione(s);
  };
  m.appendChild(b);
 });
}

// 🎨 COLORE PERSONAGGIO
function getColore(nome){
 if(!nome) return '#333';
 let hash=0;
 for(let i=0;i<nome.length;i++) hash=nome.charCodeAt(i)+((hash<<5)-hash);
 const h=hash%360;
 return `hsl(${h},60%,40%)`;
}

function buildCommenti(commenti){
 if(!Array.isArray(commenti)||!commenti.length) return '';

 const nuovi=commenti.some(c=>c.nuovo);

 const list=commenti.map(c=>{
  const colore=getColore(c.nome);
  return `
  <div class="commento" style="border-left:4px solid ${colore}">
    <div class="avatar">${esc(c.avatar||'👤')}</div>
    <div>
      <div class="nome" style="color:${colore}">${esc(c.nome||'Anon')}</div>
      <div class="meta">${esc(c.data||'')}</div>
      <div>${esc(c.testo||'')}</div>
    </div>
  </div>`;
 }).join('');

 return `
 <div class="commenti-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">
 💬 ${commenti.length} commenti ${nuovi?'<span class="badge-new">NEW</span>':''}
 </div>
 <div class="commenti-box">${list}</div>`;
}

function renderNews(news){
 const lista=document.getElementById('lista');
 lista.innerHTML='';

 news.forEach(n=>{
  const autore=CFG?.CHI?.[n.firma];

  // 📸 SEMPRE PERSONAGGIO
  let img='public/images/default.webp';
  if(autore?.img) img='public/images/'+autore.img;

  const colore=getColore(n.firma);

  const div=document.createElement('div');
  div.className='notizia';

  div.innerHTML=`
   <img src="${img}" style="width:100%;border-radius:12px;margin-bottom:10px">

   <div class="autore" style="color:${colore}">
     <span>${esc(autore?.avatar||'👤')}</span>
     <strong>${esc(n.firma||'Redazione')}</strong>
   </div>

   <h2>${esc(n.titolo)}</h2>
   <p>${esc(n.articolo||'')}</p>

   ${buildCommenti(n.commenti)}
  `;

  lista.appendChild(div);
 });
}

async function loadSezione(sez){
 const data=await safeFetch('public/data/news-v2-'+sez+'.json');
 if(!data) return;
 document.body.style.background=data.color||'#005f73';
 renderNews(data.news||[]);
}

async function init(){
 const cfg=await safeFetch('public/data/active_config_v2.json');
 if(!cfg) return;
 CFG=cfg;

 setHeader(cfg.site_settings?.header_img);

 const sezioni=[...new Set((cfg.REDAZIONE||[]).map(v=>v.sez))];
 renderMenu(sezioni);

 if(sezioni[0]) loadSezione(sezioni[0]);
}

init();

</script></body>
</html>
