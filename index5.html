<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Voce del Delfino 🐬</title>

<style>

/* ===== BASE (mantieni struttura originale) ===== */
body {
  font-family: Arial, sans-serif;
  background: #faf7f2;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 800px;
  margin: auto;
}

/* ===== CARD ===== */
.card {
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
  background: #fff;
}

/* BORDI */
.card.rss {
  border: 2px solid #ffffff;
}

.card.gen,
.card.redazionale {
  border: 2px solid #005f73;
}

/* HEADER */
.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
}

/* AVATAR */
.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
}

/* AUTORE */
.autore {
  font-weight: bold;
}

/* BODY */
.card-body {
  padding: 10px;
}

h3 {
  margin: 5px 0;
}

/* TESTO */
.testo.completo {
  display: none;
}

/* BUTTON */
.toggle {
  margin-top: 8px;
  padding: 5px 10px;
  border: none;
  background: #005f73;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* COMMENTI */
.commenti {
  padding: 10px;
}

.commento {
  padding: 6px;
  margin: 5px 0;
  border-left: 4px solid var(--colore-personaggio, #333);
}

</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

/* ===== CONFIG MOCK (usa il tuo JSON reale) ===== */
const CONFIG = {
  STILI: {
    pescara: "#005f73",
    mondo: "#cc9c7e",
    cultura: "#6a4c93"
  },
  IMMAGINI: {
    personaggio: "news-redazionale.webp"
  },
  CHI: {
    Lars: { img: "lars.webp" },
    Juizinho: { img: "juizinho.webp" },
    Cetteo: { img: "cetteo.webp" },
    Hiroki: { img: "hiroki.webp" },
    Glusi: { img: "glusi.webp" },
    Lilli: { img: "lilli.webp" },
    Wolf: { img: "wolf.webp" },
    Abbukk: { img: "abbukk.webp" },
    default: { img: "" }
  }
};

/* ===== DATI MOCK ===== */
const articoli = [
  {
    titolo: "Calamaro gigante avvistato",
    testoBreve: "Avvistamento incredibile al porto...",
    testoCompleto: "Un calamaro gigante è stato avvistato vicino al porto canale...",
    firma: "Cetteo",
    tipo: "RSS",
    sez: "pescara",
    commenti: [
      { nome: "Lars", testo: "Interessante fenomeno naturale." }
    ]
  },
  {
    titolo: "Riflessioni sul caos italiano",
    testoBreve: "L'Italia è bella ma disordinata...",
    testoCompleto: "Dopo anni in Giappone, noto differenze profonde...",
    firma: "Hiroki",
    tipo: "GEN",
    sez: "pescara",
    commenti: [
      { nome: "Glusi", testo: "Siii siii siii vero vero vero!" }
    ]
  }
];

/* ===== RENDER ===== */
function renderArticolo(articolo) {
  const personaggio = CONFIG.CHI[articolo.firma] || CONFIG.CHI.default;

  const basePath = "/images";

  const imgPersonaggio = personaggio.img
    ? `${basePath}/${personaggio.img}`
    : `${basePath}/${CONFIG.IMMAGINI.personaggio}`;

  const colore = CONFIG.STILI[articolo.sez] || "#333";

  const tipoClasse =
    articolo.tipo === "RSS" ? "rss" :
    articolo.tipo === "GEN" ? "gen" : "redazionale";

  return `
    <div class="card ${tipoClasse}" style="--colore-personaggio:${colore}">
      
      <div class="card-header">
        <img 
          class="avatar"
          src="${imgPersonaggio}"
          onerror="this.onerror=null; this.src='${basePath}/${CONFIG.IMMAGINI.personaggio}'"
        >
        <div class="autore">${articolo.firma}</div>
      </div>

      <div class="card-body">
        <h3>${articolo.titolo}</h3>

        <p class="testo corto">${articolo.testoBreve}</p>
        <p class="testo completo">${articolo.testoCompleto}</p>

        <button class="toggle">Leggi di più</button>
      </div>

      <div class="commenti">
        ${articolo.commenti.map(c => `
          <div class="commento">
            <strong>${c.nome}:</strong> ${c.testo}
          </div>
        `).join("")}
      </div>

    </div>
  `;
}

/* ===== INIT ===== */
const app = document.getElementById("app");
app.innerHTML = articoli.map(renderArticolo).join("");

/* ===== TOGGLE ===== */
document.addEventListener("click", (e) => {
  if (!e.target.classList.contains("toggle")) return;

  const card = e.target.closest(".card");
  const corto = card.querySelector(".corto");
  const completo = card.querySelector(".completo");

  if (completo.style.display === "none" || completo.style.display === "") {
    completo.style.display = "block";
    corto.style.display = "none";
    e.target.innerText = "Leggi di meno";
  } else {
    completo.style.display = "none";
    corto.style.display = "block";
    e.target.innerText = "Leggi di più";
  }
});

</script>

</body>
</html>
