<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root { --blu-mare: #005f73; --azzurro: #0091ff; --crema: #fdfaf4; }
        body { margin: 0; background: var(--crema); font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }
        #app { width: 100%; max-width: 800px; margin: auto; background: #fff; min-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        /* TESTATA CON HEADER.PGP */
        .testata { width: 100%; background: var(--blu-mare); line-height: 0; cursor: pointer; }
        .testata img { width: 100%; height: auto; }
        .data-oggi { background: #000; color: #fff; text-align: center; padding: 8px; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        /* BANNER */
        .cornice-banner { border-top: 4px solid var(--azzurro); border-bottom: 2px solid #eee; padding: 5px 0; background: #fff; display: flex; justify-content: center; }
        .cornice-banner img { height: 80px; width: auto; object-fit: contain; }
        
        .info-aggiornamento { text-align: right; font-size: 11px; color: #999; padding: 5px 15px; font-family: monospace; border-bottom: 1px solid #eee; }

        /* NAVIGAZIONE */
        .menu { display: flex; overflow-x: auto; padding: 15px; gap: 10px; scrollbar-width: none; }
        .menu::-webkit-scrollbar { display: none; }
        .tab { white-space: nowrap; padding: 10px 18px; border-radius: 25px; border: 1px solid var(--blu-mare); background: #fff; color: var(--blu-mare); font-weight: bold; font-size: 13px; }
        .tab.attiva { background: var(--blu-mare); color: #fff; }

        /* NOTIZIE */
        .notizia { padding: 20px; border-bottom: 8px solid #f9f9f9; }
        .notizia-img-box { width: 100%; aspect-ratio: 16/9; background: #eee; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        .notizia-img-box img { width: 100%; height: 100%; object-fit: contain; }
        h2 { margin: 0 0 10px 0; font-size: 22px; line-height: 1.2; color: #111; }
        .testo { font-size: 16px; line-height: 1.6; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
        .testo.aperto { -webkit-line-clamp: unset; }
        .leggi-tutto { background: none; border: none; color: var(--azzurro); font-weight: bold; padding: 10px 0; font-size: 14px; cursor: pointer; }
        
        .commento-delfino { background: #e0f2f1; padding: 15px; border-radius: 12px; margin-top: 15px; position: relative; }
        .commento-delfino:before { content: "🐬"; position: absolute; left: -10px; top: -10px; font-size: 20px; }

        /* TERMINALE */
        #terminale { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#0f0; z-index:1000; padding:20px; font-family:monospace; box-sizing:border-box; overflow:auto; }
    </style>
</head>
<body>
    <div id="app">
        <div id="terminale">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #0f0; padding-bottom:10px;">
                <span>> TERMINALE DIREZIONE</span>
                <span onclick="chiudiAdmin()" style="color:red">[X]</span>
            </div>
            <pre id="log-content" style="font-size:12px; color:#aaa; margin:20px 0;"></pre>
        </div>

        <div class="testata" id="logo-innesco">
            <img src="images/Header.pgp" alt="La Voce del Delfino" onerror="this.src='https://placehold.co/800x250?text=Header+Mancante'">
            <div class="data-oggi" id="data-display"></div>
        </div>

        <div class="cornice-banner">
            <img id="banner-img" src="" alt="">
        </div>
        <div class="info-aggiornamento" id="ts-display">Aggiornamento in corso...</div>

        <div class="menu" id="menu-categorie"></div>
        <div id="lista-notizie"></div>
    </div>

    <script>
        let clicks = 0, last = 0;
        const terminale = document.getElementById('terminale');
        
        function chiudiAdmin() { terminale.style.display = 'none'; }

        document.getElementById('logo-innesco').onclick = async () => {
            const ora = Date.now();
            if (ora - last > 1000) clicks = 0;
            clicks++; last = ora;
            if (clicks === 5) {
                clicks = 0;
                const p = prompt("Password:");
                if (!p) return;
                try {
                    const r = await fetch(`data/auth_info.json?v=${Date.now()}`);
                    const a = await r.json();
                    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p)).then(b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join(''));
                    if (hash === a.check) {
                        terminale.style.display = 'block';
                        const log = await fetch(`data/redazione.log?v=${Date.now()}`).then(res => res.text());
                        document.getElementById('log-content').innerText = log;
                    }
                } catch(e) { }
            }
        };

        async function carica() {
            try {
                const res = await fetch(`data/active_config.json?v=${Date.now()}`);
                const cfg = await res.json();
                document.getElementById('banner-img').src = `images/${cfg.site_settings.day_banner}`;
                document.getElementById('data-display').innerText = new Date().toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'});
                document.getElementById('ts-display').innerText = `ULTIMO REFRESH: ${cfg.site_settings.last_update || '---'}`;
                
                const cat = Object.keys(cfg).filter(k => !['site_settings','satira_config'].includes(k));
                const menu = document.getElementById('menu-categorie');
                cat.forEach((c, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'tab' + (i === 0 ? ' attiva' : '');
                    btn.innerText = c;
                    btn.onclick = () => mostraSezione(c, btn);
                    menu.appendChild(btn);
                });
                if (cat[0]) mostraSezione(cat[0]);
            } catch(e) { document.getElementById('lista-notizie').innerHTML = "<p style='text-align:center; padding:50px;'>Mare calmo, nessuna notizia.</p>"; }
        }

        async function mostraSezione(s, btn) {
            if (btn) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('attiva'));
                btn.classList.add('attiva');
            }
            const res = await fetch(`data/news-${s}.json?v=${Date.now()}`);
            const data = await res.json();
            document.documentElement.style.setProperty('--blu-mare', data.color);
            
            const lista = document.getElementById('lista-notizie');
            lista.innerHTML = '';
            data.news.forEach((n, idx) => {
                const div = document.createElement('div');
                div.className = 'notizia';
                div.innerHTML = `
                    <div class="notizia-img-box"><img src="images/${n.immagine}" onerror="this.src='https://placehold.co/600x400?text=News'"></div>
                    <h2>${n.titolo}</h2>
                    <div class="testo" id="t-${idx}">${n.articolo}</div>
                    <button class="leggi-tutto" onclick="document.getElementById('t-${idx}').classList.toggle('aperto'); this.innerText = (this.innerText === 'Leggi di più' ? 'Chiudi' : 'Leggi di più')">Leggi di più</button>
                    <div class="commento-delfino"><strong>Delfino:</strong> ${n.commento}</div>
                `;
                lista.appendChild(div);
            });
        }
        carica();
    </script>
</body>
</html>
