<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root {
            --accent: #a67c00;
            --bg: #e9e4d4;
            --paper: #fdfaf4;
            --text: #2b261d;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'Playfair Display', serif;
            color: var(--text);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* Testata Dinamica */
        .header-box {
            background: #fff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 1px solid #d4cdb4;
            position: relative;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .header-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: linear-gradient(135deg, #dbe9f4 0%, #ffffff 100%);
            transition: opacity 0.5s ease;
        }

        .header-overlay {
            position: relative;
            z-index: 2;
            margin-top: auto;
            padding: 40px 20px;
            background: linear-gradient(to top, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0) 100%);
            text-align: center;
        }

        .main-title {
            font-size: 3.8em;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
            color: var(--text);
        }

        .date-bar {
            font-size: 0.85em;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(0,0,0,0.4);
            letter-spacing: 3px;
            margin-top: 15px;
        }

        /* Navigazione */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn-t {
            padding: 14px 32px;
            border: 2px solid #d4cdb4;
            background: rgba(255,255,255,0.8);
            color: var(--accent);
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-t.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(166, 124, 0, 0.3);
        }

        /* Articoli */
        .card {
            background: var(--paper);
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin: 0 0 15px; font-size: 2.3em; line-height: 1.1; letter-spacing: -1px; }
        .sommario { font-size: 1.2em; line-height: 1.6; color: #444; margin-bottom: 25px; }
        
        .tag-row { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .tag { font-size: 0.8em; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .badge-fake { background: var(--accent); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.7em; font-weight: 900; }
        
        .comm-box {
            background: #fdf5e6;
            padding: 25px;
            border-left: 6px solid var(--accent);
            border-radius: 0 20px 20px 0;
            font-style: italic;
            color: #5d4037;
            font-size: 1.1em;
            line-height: 1.5;
        }

        /* Stati Vuoti */
        .empty-state {
            text-align: center;
            background: white;
            padding: 80px 40px;
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }

        #admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            opacity: 0.02;
            cursor: pointer;
            z-index: 1000;
        }

        .error-log {
            font-family: monospace;
            font-size: 0.85em;
            color: #c0392b;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header class="header-box" onclick="window.location.reload(true)">
            <img id="header-img" class="header-img" onerror="this.style.opacity='0'">
            <div class="header-overlay">
                <h1 class="main-title">La Voce del Delfino</h1>
                <div id="date-now" class="date-bar">Caricamento Edizione...</div>
            </div>
        </header>

        <div class="tabs">
            <button class="btn-t active" onclick="loadSez('mondo', this)">🌍 Mondo</button>
            <button class="btn-t" onclick="loadSez('pescara', this)">🐬 Pescara</button>
        </div>

        <div id="news-container">
            <!-- News iniettate qui -->
        </div>
        
        <div id="error-display" class="error-log">
            <strong>🔧 DEBUG DIREZIONE:</strong><br>
        </div>
    </div>

    <!-- Bottone segreto Admin in basso a destra -->
    <div id="admin-link" onclick="chiediAdmin()"></div>

    <script>
        const v = Date.now();
        let currentConfig = null;

        function logDebug(msg) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML += `> ${msg}<br>`;
        }

        async function init() {
            logDebug("Inizializzazione Vetrina...");
            try {
                // Tentativo di caricamento config da più percorsi possibili
                const paths = [
                    `public/data/active_config.json?v=${v}`,
                    `data/active_config.json?v=${v}`,
                    `public/data/config.json?v=${v}`,
                    `data/config.json?v=${v}`
                ];
                
                let res = null;
                for (let p of paths) {
                    res = await fetch(p);
                    if (res.ok) {
                        logDebug(`Configurazione trovata in: ${p}`);
                        break;
                    }
                }
                
                if (!res || !res.ok) {
                    logDebug("ERRORE: Nessun file di configurazione trovato nelle cartelle previste.");
                    throw new Error("404 Config");
                }
                
                currentConfig = await res.json();
                
                // Impostazione Logo Dinamico
                const headerFile = currentConfig.site_settings?.Header || currentConfig.site_settings?.header_img || 'header.webp';
                const hImg = document.getElementById('header-img');
                
                // Prova i percorsi per l'immagine
                const imgPaths = [`public/images/${headerFile}`, `images/${headerFile}`];
                let imgFound = false;
                for (let ip of imgPaths) {
                    const testImg = new Image();
                    testImg.src = `${ip}?v=${v}`;
                    testImg.onload = () => {
                        hImg.src = `${ip}?v=${v}`;
                        hImg.style.opacity = '1';
                        imgFound = true;
                    };
                }

                loadSez('mondo', document.querySelector('.btn-t.active'));

            } catch (e) {
                console.error("Init Error:", e);
                mostraVuoto("Configurazione mancante o errata. Il Delfino non sa dove nuotare!");
            }
        }

        async function loadSez(sez, btn) {
            if(document.querySelectorAll('.btn-t').length > 0) {
                document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
            }
            if(btn) btn.classList.add('active');

            const container = document.getElementById('news-container');
            container.innerHTML = '<div style="text-align:center; padding:80px; font-size:1.2em; color:#999;">🐟 Il Delfino sta pescando le news di oggi...</div>';

            try {
                const paths = [
                    `public/data/news-${sez}.json?v=${v}`,
                    `data/news-${sez}.json?v=${v}`
                ];

                let r = null;
                for (let p of paths) {
                    r = await fetch(p);
                    if (r.ok) break;
                }

                if (!r || !r.ok) throw new Error(`File news-${sez}.json non trovato`);
                
                const data = await r.json();
                if (!data.news || data.news.length === 0) {
                    mostraVuoto("Il file esiste ma le reti sono rimaste vuote (0 articoli).");
                    return;
                }

                if (data.today) document.getElementById('date-now').innerText = data.today;
                
                container.innerHTML = '';
                data.news.forEach(n => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="tag-row">
                            <span class="tag">${n.categoria || 'NOTIZIA'} • ${n.fonte || 'Redazione'}</span>
                            ${n.isFake ? '<span class="badge-fake">SATIRA</span>' : ''}
                        </div>
                        <h3>${n.titolo}</h3>
                        <div class="sommario">${n.sommario}</div>
                        <div class="comm-box">
                            <strong>🐬 Il commento:</strong><br>
                            ${n.commento}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch(e) {
                logDebug(`Errore sezione ${sez}: ${e.message}`);
                mostraVuoto("Le reti sono ancora vuote — il Delfino sta lavorando!");
            }
        }

        function mostraVuoto(msg) {
            document.getElementById('news-container').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 5em; margin-bottom: 20px;">🌊</div>
                    <h2 style="font-family: serif;">Notizie in arrivo</h2>
                    <p style="color: #666; max-width: 450px; margin: auto; line-height: 1.6;">
                        ${msg}<br><br>
                        <small>Suggerimento: Controlla che i file JSON siano nella cartella corretta su GitHub.</small>
                    </p>
                    <button onclick="location.reload(true)" style="margin-top:30px; padding:14px 40px; background:var(--accent); color:white; border:none; border-radius:30px; cursor:pointer; font-weight:bold; letter-spacing:1px;">🔄 AGGIORNA PAGINA</button>
                </div>`;
        }

        function chiediAdmin() {
            const pwd = prompt("PIN Direttore:");
            fetch(`public/data/auth_info.json?v=${v}`)
                .then(r => r.json())
                .then(d => {
                    if (pwd === d.key) {
                        alert("ACCESSO CONFERMATO.\nIl terminale debug è attivo in fondo alla pagina.");
                        document.getElementById('error-display').style.display = 'block';
                    }
                    else alert("ACCESSO NEGATO.");
                }).catch(() => alert("Auth non disponibile."));
        }

        window.onload = init;
    </script>
</body>
</html>
