<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root {
            --accent: #a67c00;
            --bg: #e9e4d4;
            --paper: #fdfaf4;
            --text: #2b261d;
            --delfino-blue: #dbe9f4;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'Playfair Display', serif;
            color: var(--text);
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* Testata Dinamica */
        .header-box {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 1px solid #d4cdb4;
            position: relative;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .header-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: linear-gradient(135deg, #dbe9f4 0%, #ffffff 100%);
            transition: opacity 0.5s ease;
        }

        .header-overlay {
            position: relative;
            z-index: 2;
            margin-top: auto;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 100%);
            text-align: center;
        }

        .date-bar {
            font-size: 0.8em;
            text-transform: uppercase;
            font-weight: bold;
            color: rgba(0,0,0,0.5);
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn-t {
            padding: 12px 30px;
            border: 2px solid #d4cdb4;
            background: rgba(255,255,255,0.7);
            color: var(--accent);
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-family: sans-serif;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .btn-t.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        /* News Cards */
        .card {
            background: var(--paper);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin: 0 0 15px; font-size: 2.2em; line-height: 1.1; letter-spacing: -1px; }
        .sommario { font-size: 1.15em; line-height: 1.6; color: #444; margin-bottom: 25px; }
        
        .tag-row { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .tag { font-size: 0.8em; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .badge-fake { background: var(--accent); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7em; font-weight: bold; font-family: sans-serif; }
        
        .comm-box {
            background: #fdf5e6;
            padding: 20px;
            border-left: 5px solid var(--accent);
            border-radius: 0 15px 15px 0;
            font-style: italic;
            color: #5d4037;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            background: white;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        #admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            opacity: 0.05;
            cursor: pointer;
            z-index: 100;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <header class="header-box" onclick="window.location.reload(true)">
            <!-- L'immagine viene impostata dinamicamente dallo script -->
            <img id="header-img" class="header-img" onerror="this.style.opacity='0'">
            <div class="header-overlay">
                <div style="font-size: 3.5em; font-weight: bold; letter-spacing: -2px; margin-bottom: 5px;">La Voce del Delfino</div>
                <div id="date-now" class="date-bar">Pescara, Abruzzo</div>
            </div>
        </header>

        <div class="tabs">
            <button class="btn-t active" onclick="loadSez('mondo', this)">🌍 Notizie dal Mondo</button>
            <button class="btn-t" onclick="loadSez('pescara', this)">🐬 Pescara & Abruzzo</button>
        </div>

        <div id="news-container">
            <!-- News iniettate qui -->
        </div>
    </div>

    <div id="admin-link" onclick="chiediAdmin()"></div>

    <script>
        const v = Date.now();
        let currentConfig = null;

        // 1. Inizializzazione: legge il config e imposta il logo
        async function init() {
            try {
                // Prova a leggere il config attivo (quello dell'ultimo giro del bot)
                let res = await fetch(`public/data/active_config.json?v=${v}`);
                if (!res.ok) res = await fetch(`public/data/config.json?v=${v}`);
                
                currentConfig = await res.json();
                
                // IMPOSTA LOGO DINAMICO
                if (currentConfig.site_settings && currentConfig.site_settings.header_img) {
                    const hImg = document.getElementById('header-img');
                    hImg.src = `public/images/${currentConfig.site_settings.header_img}?v=${v}`;
                }

                // Avvia la prima sezione
                const defaultBtn = document.querySelector('.btn-t.active');
                loadSez('mondo', defaultBtn);

            } catch (e) {
                console.error("Errore inizializzazione:", e);
                mostraVuoto();
            }
        }

        async function loadSez(sez, btn) {
            document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const container = document.getElementById('news-container');
            container.innerHTML = '<div style="text-align:center; padding:100px; font-size:1.2em; color:#999;">🐟 Il Delfino sta pescando le news...</div>';

            try {
                const r = await fetch(`public/data/news-${sez}.json?v=${v}`);
                if (!r.ok) throw new Error("Dati non pronti");
                
                const data = await r.json();
                if (!data.news || data.news.length === 0) {
                    mostraVuoto();
                    return;
                }

                // Aggiorna data testata
                if (data.today) document.getElementById('date-now').innerText = data.today;
                
                container.innerHTML = '';
                data.news.forEach(n => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="tag-row">
                            <span class="tag">${n.categoria || 'NOTIZIA'} • ${n.fonte || 'Redazione'}</span>
                            ${n.isFake ? '<span class="badge-fake">SATIRA</span>' : ''}
                        </div>
                        <h3>${n.titolo}</h3>
                        <div class="sommario">${n.sommario}</div>
                        <div class="comm-box">
                            <strong>🐬 Il commento:</strong><br>
                            ${n.commento}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch(e) {
                mostraVuoto();
            }
        }

        function mostraVuoto() {
            document.getElementById('news-container').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 4em; margin-bottom: 20px;">🌊</div>
                    <h3>Reti vuote</h3>
                    <p>Le notizie non sono ancora arrivate — il Delfino sta lavorando!<br>Torna a trovarci tra poco.</p>
                </div>`;
        }

        function chiediAdmin() {
            const pwd = prompt("Identificazione Direttore:");
            fetch(`public/data/auth_info.json?v=${v}`)
                .then(r => r.json())
                .then(d => {
                    if (pwd === d.key) alert("Accesso Admin Sbloccato.");
                    else alert("Accesso negato.");
                }).catch(() => alert("Sistema di sicurezza non pronto."));
        }

        // Avvio
        window.onload = init;
    </script>
</body>
</html>
