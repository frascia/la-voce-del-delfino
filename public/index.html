<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root {
            --accent: #a67c00;
            --bg: #e9e4d4;
            --paper: #fdfaf4;
            --text: #2b261d;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'Playfair Display', serif;
            color: var(--text);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* Testata Dinamica - Trasparenza Totale */
        .header-box {
            background: transparent;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .header-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Usiamo contain per non tagliare il logo */
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: transparent;
            transition: opacity 0.5s ease;
            opacity: 0; /* Parte invisibile, diventa 1 solo se caricata con successo */
        }

        .header-overlay {
            position: relative;
            z-index: 2;
            margin-top: auto;
            padding: 20px;
            background: transparent;
            text-align: center;
        }

        .main-title {
            font-size: 3.8em;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
            color: var(--text);
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }

        .date-bar {
            font-size: 0.85em;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(0,0,0,0.4);
            letter-spacing: 3px;
            margin-top: 15px;
            background: rgba(255,255,255,0.4);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Navigazione Dinamica */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-t {
            padding: 14px 32px;
            border: 2px solid #d4cdb4;
            background: rgba(255,255,255,0.8);
            color: var(--accent);
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-t.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(166, 124, 0, 0.3);
        }

        /* Articoli */
        .card {
            background: var(--paper);
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin: 0 0 15px; font-size: 2.3em; line-height: 1.1; letter-spacing: -1px; }
        .sommario { font-size: 1.2em; line-height: 1.6; color: #444; margin-bottom: 25px; }
        
        .tag-row { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .tag { font-size: 0.8em; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .badge-fake { background: var(--accent); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.7em; font-weight: 900; }
        
        .comm-box {
            background: #fdf5e6;
            padding: 25px;
            border-left: 6px solid var(--accent);
            border-radius: 0 20px 20px 0;
            font-style: italic;
            color: #5d4037;
            font-size: 1.1em;
            line-height: 1.5;
        }

        /* Stati Vuoti */
        .empty-state {
            text-align: center;
            background: white;
            padding: 80px 40px;
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }

        #admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            opacity: 0.02;
            cursor: pointer;
            z-index: 1000;
        }

        .error-log {
            font-family: monospace;
            font-size: 0.85em;
            color: #c0392b;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header class="header-box" onclick="window.location.reload(true)">
            <!-- Rimosso onerror inline, gestiamo tutto tramite Javascript -->
            <img id="header-img" class="header-img" alt="La Voce del Delfino">
            <div class="header-overlay">
                <!-- Questo titolo appare SOLO se il logo non viene trovato -->
                <h1 id="fallback-title" class="main-title" style="display: none;">La Voce del Delfino</h1>
                <div id="date-now" class="date-bar">Caricamento Edizione...</div>
            </div>
        </header>

        <div class="tabs" id="tabs-container">
            <!-- I bottoni verranno generati dinamicamente -->
        </div>

        <div id="news-container">
            <!-- News iniettate qui -->
        </div>
        
        <div id="error-display" class="error-log">
            <strong>🔧 DEBUG DIREZIONE:</strong><br>
        </div>
    </div>

    <!-- Bottone segreto Admin -->
    <div id="admin-link" onclick="chiediAdmin()"></div>

    <script>
        const v = Date.now();
        let currentConfig = null;

        function logDebug(msg) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML += `> ${msg}<br>`;
        }

        async function init() {
            logDebug("Inizializzazione Vetrina...");
            try {
                const paths = [
                    `public/data/active_config.json?v=${v}`,
                    `data/active_config.json?v=${v}`,
                    `public/data/config.json?v=${v}`
                ];
                
                let res = null;
                for (let p of paths) {
                    res = await fetch(p);
                    if (res.ok) break;
                }
                
                if (!res || !res.ok) throw new Error("Config non trovato");
                currentConfig = await res.json();
                
                const headerFile = currentConfig.site_settings?.Header || currentConfig.site_settings?.header_img;
                
                // GESTIONE INTELLIGENTE DEL LOGO
                const hImg = document.getElementById('header-img');
                const fallbackTitle = document.getElementById('fallback-title');
                
                if (headerFile) {
                    // Coda dei percorsi da provare
                    const imgPaths = [`images/${headerFile}`, `public/images/${headerFile}`];
                    
                    hImg.onload = () => {
                        hImg.style.opacity = '1';
                        fallbackTitle.style.display = 'none'; // Nasconde la scritta se c'è l'immagine
                        logDebug("Logo caricato con successo.");
                    };
                    
                    hImg.onerror = () => {
                        if (imgPaths.length > 0) {
                            // Se fallisce, prova il prossimo percorso della lista
                            hImg.src = `${imgPaths.shift()}?v=${v}`;
                        } else {
                            // Se falliscono tutti, mostra il testo come salvagente
                            hImg.style.opacity = '0';
                            fallbackTitle.style.display = 'block';
                            logDebug("Impossibile trovare il logo. Attivata scritta di sicurezza.");
                        }
                    };
                    
                    // Fai partire il primo tentativo
                    hImg.src = `${imgPaths.shift()}?v=${v}`;
                } else {
                    fallbackTitle.style.display = 'block';
                }

                const tabsContainer = document.getElementById('tabs-container');
                const sezioni = Object.keys(currentConfig).filter(k => 
                    !['site_settings', 'satira_config'].includes(k)
                );

                if (sezioni.length === 0) {
                    mostraVuoto("Nessuna sezione configurata.");
                    return;
                }

                sezioni.forEach((sez, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-t' + (index === 0 ? ' active' : '');
                    let emoji = sez.toLowerCase().includes('pescara') ? '🐬' : '🌍';
                    btn.innerHTML = `${emoji} ${sez}`;
                    btn.onclick = () => loadSez(sez, btn);
                    tabsContainer.appendChild(btn);
                });

                loadSez(sezioni[0], tabsContainer.firstChild);

            } catch (e) {
                logDebug(`Errore Init: ${e.message}`);
                mostraVuoto("Il Delfino è rimasto impigliato. Controlla i file JSON.");
            }
        }

        async function loadSez(sezKey, btn) {
            document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            const container = document.getElementById('news-container');
            container.innerHTML = '<div style="text-align:center; padding:80px; font-size:1.2em; color:#999;">🐟 Il Delfino sta pescando le news...</div>';

            try {
                const sezColor = currentConfig[sezKey]?.color || '#a67c00';
                document.documentElement.style.setProperty('--accent', sezColor);

                const paths = [
                    `public/data/news-${sezKey.toLowerCase()}.json?v=${v}`,
                    `data/news-${sezKey.toLowerCase()}.json?v=${v}`
                ];

                let r = null;
                for (let p of paths) {
                    r = await fetch(p);
                    if (r.ok) break;
                }

                if (!r || !r.ok) throw new Error(`Dati news-${sezKey} non trovati`);
                
                const data = await r.json();
                
                // SE IL FILE ESISTE MA È VUOTO:
                if (!data.news || data.news.length === 0) {
                    mostraVuoto("Il file JSON è stato trovato, ma non contiene articoli (0 news generate dal Bot).");
                    return;
                }

                if (data.today) document.getElementById('date-now').innerText = data.today;
                
                container.innerHTML = '';
                data.news.forEach(n => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="tag-row">
                            <span class="tag">${n.categoria || 'NEWS'} • ${n.fonte || 'Ansa'}</span>
                            ${n.isFake ? '<span class="badge-fake">SATIRA</span>' : ''}
                        </div>
                        <h3>${n.titolo}</h3>
                        <div class="sommario">${n.sommario}</div>
                        <div class="comm-box">
                            <strong>🐬 Il commento:</strong><br>
                            ${n.commento}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch(e) {
                logDebug(`Errore caricamento ${sezKey}: ${e.message}`);
                mostraVuoto("I file delle notizie non sono stati trovati su GitHub.");
            }
        }

        function mostraVuoto(msg) {
            document.getElementById('news-container').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 5em; margin-bottom: 20px;">🌊</div>
                    <h2 style="font-family: serif;">Orizzonte Libero</h2>
                    <p style="color: #666; max-width: 450px; margin: auto; line-height: 1.6;">
                        ${msg}<br><br>
                        <small>Se hai appena fatto modifiche su GitHub, aspetta che il processo sia completato.</small>
                    </p>
                    <button onclick="location.reload(true)" style="margin-top:30px; padding:14px 40px; background:var(--accent); color:white; border:none; border-radius:30px; cursor:pointer; font-weight:bold;">🔄 AGGIORNA ORA</button>
                </div>`;
        }

        function chiediAdmin() {
            const pwd = prompt("PIN Direttore:");
            fetch(`public/data/auth_info.json?v=${v}`)
                .then(r => r.json())
                .then(d => {
                    if (pwd === d.key) {
                        alert("DIRETTORE IDENTIFICATO.\nConsole Debug attiva.");
                        document.getElementById('error-display').style.display = 'block';
                    } else alert("NEGATO.");
                }).catch(() => alert("Auth offline."));
        }

        window.onload = init;
    </script>
</body>
</html>
