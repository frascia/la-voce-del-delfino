<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root { --main-color: #005f73; --pescara-blue: #0091ff; }
        body { 
            margin: 0; background: #fdfaf4; font-family: 'Segoe UI', sans-serif; color: #333; 
            padding: 0; -webkit-user-select: none; user-select: none; 
        }
        #root { width: 100%; max-width: 850px; margin: auto; }
        
        /* HEADER */
        .header-box { width: 100%; background-color: var(--main-color); overflow: hidden; cursor: default; }
        .header-img { width: 100%; height: auto; display: block; object-fit: cover; }

        .day-banner-box { 
            width: 100%; aspect-ratio: 6 / 1; max-height: 120px; background: #fff;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 3px solid var(--pescara-blue);
            margin-bottom: 10px;
        }
        .day-banner-img { height: 100%; width: auto; object-fit: contain; }

        .update-stamp { text-align: right; font-family: monospace; font-size: 0.65em; color: #777; padding: 5px 12px; background: #eee; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .date-bar { text-align: center; padding: 10px; background: #000; color: white; font-size: 0.8em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .main-content { padding: 0 12px 40px 12px; }

        /* CARDS FISARMONICA */
        .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); border: 1px solid #eee; overflow: hidden; }
        .img-container { width: calc(100% + 40px); margin: -20px -20px 15px -20px; aspect-ratio: 16 / 9; background: #f4f4f4; display: flex; justify-content: center; align-items: center; }
        .img-n { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .truncated { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-expand { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #f4f4f4; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; font-size: 0.75em; font-weight: bold; }

        /* ADMIN AREA (MATRIX STYLE) */
        #admin-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 9999; color: #00ff41; font-family: monospace; 
            padding: 25px; box-sizing: border-box; overflow-y: auto; 
        }
        .admin-head { display: flex; justify-content: space-between; border-bottom: 1px solid #00ff41; padding-bottom: 15px; margin-bottom: 20px; }
        .logout-btn { cursor: pointer; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 5px 15px; border-radius: 5px; }
        .secret-card { border: 1px solid #00ff41; padding: 15px; margin-bottom: 10px; background: rgba(0,255,65,0.05); }

        @media (min-width: 600px) {
            body { padding: 12px; }
            .header-box { border-radius: 20px 20px 0 0; }
            .day-banner-box { border-radius: 0 0 20px 20px; border: 2px solid var(--pescara-blue); }
            .main-content { padding: 0; }
            .img-container { width: 100%; margin: 0 0 15px 0; border-radius: 12px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="root">
        <!-- Pannello Admin -->
        <div id="admin-overlay">
            <div class="admin-head">
                <span>> TERMINALE DIREZIONE (PROTOCOLLO CRIPTATO)</span>
                <div class="logout-btn" onclick="chiudiAdmin()">LOGOUT [X]</div>
            </div>
            <div id="admin-log" style="font-size:0.85em; margin-bottom:25px; color:#888;"></div>
            <div id="admin-secrets"></div>
        </div>

        <header class="header-box" id="admin-trigger">
            <img id="main-header-img" src="" class="header-img" alt="Testata">
            <div class="date-bar" id="date-now"></div>
        </header>
        
        <div class="day-banner-box">
            <img id="day-banner-img" src="" class="day-banner-img">
        </div>
        
        <div id="update-stamp" class="update-stamp">---</div>

        <div class="main-content">
            <div class="tabs" id="tabs"></div>
            <div id="news-container"></div>
        </div>
    </div>

    <script>
        let clickCount = 0, lastClick = 0;
        let adminSessionData = null; // Memoria temporanea volatile

        // Funzione per ripulire tutto all'uscita
        function chiudiAdmin() {
            document.getElementById('admin-overlay').style.display = 'none';
            document.getElementById('admin-secrets').innerHTML = "";
            document.getElementById('admin-log').innerText = "";
            adminSessionData = null; // CANCELLA I DATI DALLA MEMORIA
            console.log("Sessione Admin terminata. Memoria ripulita.");
        }

        /**
         * Funzioni di Sicurezza Browser
         */
        async function hashString(str) {
            const msgUint8 = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function decrypt(cipher, key) {
            const text = atob(cipher);
            let result = "";
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        // Innesco Admin: 5 click rapidi
        document.getElementById('admin-trigger').addEventListener('click', async () => {
            const now = Date.now();
            if (now - lastClick > 1000) clickCount = 0; 
            clickCount++; lastClick = now;

            if (clickCount === 5) {
                clickCount = 0;
                const pwd = prompt("Identificazione richiesta:");
                if (!pwd) return;

                const h = await hashString(pwd);
                try {
                    const res = await fetch(`data/auth_info.json?v=${Date.now()}`);
                    const auth = await res.json();
                    
                    if (h === auth.check) {
                        // Successo! Decriptiamo i dati solo ora usando la password fornita
                        const decrypted = decrypt(auth.data, pwd);
                        adminSessionData = decrypted.split('|');
                        
                        document.getElementById('admin-overlay').style.display = 'block';
                        const log = await (await fetch(`data/redazione.log?v=${Date.now()}`)).text();
                        document.getElementById('admin-log').innerText = log;
                        
                        let html = "<strong>MESSAGGI RISERVATI:</strong><br><br>";
                        adminSessionData.forEach(s => html += `<div class="secret-card">> ${s}</div>`);
                        document.getElementById('admin-secrets').innerHTML = html;
                    } else {
                        alert("Chiave errata.");
                    }
                } catch(e) { alert("Sistemi non sincronizzati."); }
            }
        });

        // Inizializzazione Sito
        async function init() {
            try {
                const res = await fetch(`data/active_config.json?v=${Date.now()}`);
                const config = await res.json();
                document.getElementById('main-header-img').src = `images/${config.site_settings.header_img}`;
                document.getElementById('day-banner-img').src = `images/${config.site_settings.day_banner}`;
                document.getElementById('date-now').innerText = new Date().toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
                document.getElementById('update-stamp').innerText = `ULTIMO AGGIORNAMENTO: ${config.site_settings.last_update || 'N/A'}`;
                
                const activeSezs = Object.keys(config).filter(k => !['site_settings', 'satira_config'].includes(k) && Object.values(config[k]).some(i => i.count > 0));
                const tDiv = document.getElementById('tabs');
                if (activeSezs.length === 0) return;
                activeSezs.forEach(s => {
                    const b = document.createElement('button'); b.className = 'btn-t'; b.innerText = s;
                    b.onclick = () => loadSez(s); tDiv.appendChild(b);
                });
                loadSez(activeSezs[0]);
            } catch(e) {}
        }

        async function loadSez(s) {
            document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.btn-t')).find(b => b.innerText === s);
            if (activeBtn) activeBtn.classList.add('active');
            const r = await fetch(`data/news-${s}.json?v=${Date.now()}`);
            const data = await r.json();
            document.documentElement.style.setProperty('--main-color', data.color);
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            data.news.forEach((n, idx) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="tag-row"><span class="tag">${n.categoria}</span>${n.isFake ? '<span class="badge-fake">FAKE</span>' : ''}</div>
                        <div class="img-container"><img src="images/${n.immagine}" class="img-n"></div>
                        <h3>${n.titolo}</h3>
                        <div id="art-${idx}" class="content-text truncated">${n.articolo}</div>
                        <button class="btn-expand" onclick="this.previousElementSibling.classList.toggle('truncated'); this.innerText = this.innerText === 'Leggi di più' ? 'Chiudi' : 'Leggi di più'">Leggi di più</button>
                        <div class="comm-box">
                            <div class="comm-text comm-truncated">🐬 <strong>Il Delfino:</strong> ${n.commento}</div>
                            <button class="btn-expand" style="background:none; border:none; color:var(--main-color); margin-top:5px; text-align:left;" onclick="this.previousElementSibling.classList.toggle('comm-truncated'); this.innerText = this.innerText === 'Leggi tutto' ? 'Chiudi' : 'Leggi tutto'">Leggi tutto</button>
                        </div>
                    </div>`;
            });
        }
        init();
    </script>
</body>
</html>
