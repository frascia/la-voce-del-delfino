<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root {
            --accent: #a67c00;
            --bg: #e9e4d4;
            --paper: #fdfaf4;
            --text: #2b261d;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'Playfair Display', serif;
            color: var(--text);
            -webkit-user-select: none;
            user-select: none;
        }

        /* Top Bar Aggiornamento */
        #update-banner {
            background: var(--accent);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 0.85em;
            display: none;
            font-family: sans-serif;
            letter-spacing: 1px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* Testata Acquerello */
        .header-box {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 1px solid #d4cdb4;
            position: relative;
        }

        .header-img {
            width: 100%;
            height: auto;
            display: block;
            min-height: 200px;
            background: linear-gradient(to bottom, #dbe9f4, #f4f9fc);
        }

        .header-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: rgba(0,0,0,0.05);
            text-align: center;
        }

        .date-bar {
            font-size: 0.75em;
            text-transform: uppercase;
            font-weight: bold;
            color: rgba(0,0,0,0.4);
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn-t {
            padding: 12px 30px;
            border: 2px solid #d4cdb4;
            background: rgba(255,255,255,0.7);
            color: var(--accent);
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-t.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        /* News Cards */
        .card {
            background: var(--paper);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin: 0 0 15px; font-size: 2em; line-height: 1.1; }
        .sommario { font-size: 1.1em; line-height: 1.6; color: #555; margin-bottom: 25px; }
        
        .tag-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .tag { font-size: 0.75em; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .comm-box {
            background: #fdf5e6;
            padding: 20px;
            border-left: 5px solid var(--accent);
            border-radius: 0 15px 15px 0;
            font-style: italic;
            color: #5d4037;
        }

        /* Empty / Loading State */
        .empty-state {
            text-align: center;
            background: white;
            padding: 60px;
            border-radius: 30px;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .btn-retry {
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            opacity: 0.1;
            cursor: pointer;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <div id="update-banner">
        🔄 IL DELFINO STA AGGIORNANDO LE NOTIZIE — STAI LEGGENDO L'EDIZIONE PRECEDENTE
    </div>

    <div class="container">
        <header class="header-box" onclick="window.location.reload(true)">
            <!-- Carichiamo la testata con cache buster -->
            <img src="public/images/testata_comune_delfino.webp" class="header-img" id="header-img" onerror="this.src='https://images.unsplash.com/photo-1551009175-8a68da93d5f9?auto=format&fit=crop&w=1000&q=80'">
            <div class="header-overlay">
                <div style="font-size: 3em; font-weight: bold; letter-spacing: -2px;">La Voce del Delfino</div>
                <div id="date-now" class="date-bar">Caricamento data...</div>
            </div>
        </header>

        <div class="tabs">
            <button class="btn-t active" onclick="loadSez('mondo', this)">🌍 NOTIZIE DAL MONDO</button>
            <button class="btn-t" onclick="loadSez('pescara', this)">🐬 PESCARA & ABRUZZO</button>
        </div>

        <div id="news-container">
            <!-- Qui verranno iniettate le news -->
        </div>
    </div>

    <div id="admin-link" onclick="chiediAdmin()"></div>

    <script>
        // TRUCCO DEL DELFINO: Aggiungiamo sempre un numero casuale ai file per saltare la cache!
        const v = Date.now();

        async function loadSez(sez, btn) {
            // Cambio stile bottoni
            document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const container = document.getElementById('news-container');
            container.innerHTML = '<div style="text-align:center; padding:50px; font-size:1.5em; color:#999;">🐟 Il Delfino sta pescando le news...</div>';

            try {
                // FETCH CON CACHE BUSTER (v=...)
                const r = await fetch(`public/data/news-${sez}.json?v=${v}`);
                if (!r.ok) throw new Error("File non trovato");
                
                const data = await r.json();
                
                if (!data.news || data.news.length === 0) {
                    mostraVuoto();
                    return;
                }

                document.getElementById('date-now').innerText = data.today || new Date().toLocaleDateString('it-IT');
                
                container.innerHTML = '';
                data.news.forEach(n => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="tag-row">
                            <span class="tag">${n.categoria || 'NOTIZIA'} • ${n.fonte || 'Redazione'}</span>
                            ${n.isFake ? '<span class="badge-fake">DIRETTA DAL FUTURO</span>' : ''}
                        </div>
                        <h3>${n.titolo}</h3>
                        <div class="sommario">${n.sommario}</div>
                        <div class="comm-box">
                            <strong>🐬 Il commento:</strong><br>
                            ${n.commento}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch(e) {
                console.error(e);
                mostraVuoto();
            }
        }

        function mostraVuoto() {
            document.getElementById('news-container').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 5em;">🌊</div>
                    <h3>Notizie in arrivo</h3>
                    <p>Le reti sono ancora vuote — il Delfino sta lavorando!<br>Torna tra qualche minuto.</p>
                    <button class="btn-retry" onclick="location.reload()">🔄 RIPROVA</button>
                </div>`;
        }

        function chiediAdmin() {
            const pwd = prompt("Chiave Direttore:");
            fetch(`public/data/auth_info.json?v=${v}`)
                .then(r => r.json())
                .then(d => {
                    if (pwd === d.key) alert("Accesso Admin sbloccato (Funzione in arrivo)");
                    else alert("Accesso negato.");
                });
        }

        // Avvio automatico
        window.onload = () => {
            const defaultBtn = document.querySelector('.btn-t.active');
            loadSez('mondo', defaultBtn);
            
            // Aggiorna l'immagine testata col cache buster
            const hImg = document.getElementById('header-img');
            hImg.src = hImg.src + "?v=" + v;
        };
    </script>
</body>
</html>
