<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root {
            --accent: #a67c00;
            --bg: #e9e4d4;
            --paper: #fdfaf4;
            --text: #2b261d;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'Playfair Display', serif;
            color: var(--text);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* Testata Dinamica - Dimensioni Originali Ripristinate */
        .header-box {
            background: transparent;
            margin-bottom: 10px;
            position: relative;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .header-img {
            max-width: 100%;
            max-height: 280px; /* Ripristinato a 280px */
            object-fit: contain;
            display: block;
            transition: opacity 0.8s ease;
            opacity: 0; 
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.15));
        }

        .main-title {
            font-size: 4em;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
            color: var(--text);
            text-align: center;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
            width: 100%;
        }

        .date-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .date-bar {
            font-size: 0.85em;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(0,0,0,0.5);
            letter-spacing: 3px;
            background: rgba(255,255,255,0.6);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Navigazione Dinamica */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-t {
            padding: 14px 32px;
            border: 2px solid #d4cdb4;
            background: rgba(255,255,255,0.8);
            color: var(--accent);
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-t.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(166, 124, 0, 0.3);
        }

        /* Banner Aggiornamento */
        .update-banner {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            border: 1px solid #ffeeba;
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Articoli */
        .card {
            background: var(--paper);
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        /* Immagini degli articoli */
        .article-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            background-color: #eaeaea;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin: 0 0 15px; font-size: 2.3em; line-height: 1.1; letter-spacing: -1px; }
        .sommario { font-size: 1.2em; line-height: 1.6; color: #444; margin-bottom: 25px; }
        
        .tag-row { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .tag { font-size: 0.8em; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .badge-fake { background: var(--accent); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.7em; font-weight: 900; }
        
        .comm-box {
            background: #fdf5e6;
            padding: 25px;
            border-left: 6px solid var(--accent);
            border-radius: 0 20px 20px 0;
            font-style: italic;
            color: #5d4037;
            font-size: 1.1em;
            line-height: 1.5;
        }

        #admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            opacity: 0.02;
            cursor: pointer;
            z-index: 1000;
        }

        .error-log {
            font-family: monospace;
            font-size: 0.85em;
            color: #c0392b;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <!-- Testata -->
        <header class="header-box" onclick="window.location.reload(true)" title="Ricarica la pagina">
            <img id="header-img" class="header-img" alt="La Voce del Delfino">
            <h1 id="fallback-title" class="main-title" style="display: none;">La Voce del Delfino</h1>
        </header>

        <!-- Data -->
        <div class="date-container">
            <div id="date-now" class="date-bar">Caricamento Edizione...</div>
        </div>

        <div class="tabs" id="tabs-container">
            <!-- I bottoni verranno generati dinamicamente -->
        </div>

        <!-- Banner Aggiornamento -->
        <div id="update-banner" class="update-banner"></div>

        <div id="news-container">
            <!-- News iniettate qui -->
        </div>
        
        <div id="error-display" class="error-log">
            <strong>🔧 DEBUG DIREZIONE:</strong><br>
        </div>
    </div>

    <!-- Bottone segreto Admin -->
    <div id="admin-link" onclick="chiediAdmin()"></div>

    <script>
        const v = Date.now();
        let currentConfig = null;

        function logDebug(msg) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML += `> ${msg}<br>`;
        }

        function showBanner(text) {
            const banner = document.getElementById('update-banner');
            banner.style.display = 'block';
            banner.innerHTML = text;
        }

        async function init() {
            logDebug("Inizializzazione Vetrina...");
            try {
                const paths = [
                    `public/data/active_config.json?v=${v}`,
                    `data/active_config.json?v=${v}`,
                    `public/data/config.json?v=${v}`
                ];
                
                let res = null;
                for (let p of paths) {
                    res = await fetch(p);
                    if (res.ok) break;
                }
                
                if (!res || !res.ok) throw new Error("Config non trovato");
                currentConfig = await res.json();
                
                const headerFile = currentConfig.site_settings?.Header || currentConfig.site_settings?.header_img;
                
                const hImg = document.getElementById('header-img');
                const fallbackTitle = document.getElementById('fallback-title');
                
                if (headerFile) {
                    const imgPaths = [`images/${headerFile}`, `public/images/${headerFile}`];
                    
                    hImg.onload = () => {
                        hImg.style.opacity = '1';
                        fallbackTitle.style.display = 'none';
                        logDebug("Logo caricato con successo.");
                    };
                    
                    hImg.onerror = () => {
                        if (imgPaths.length > 0) {
                            hImg.src = `${imgPaths.shift()}?v=${v}`;
                        } else {
                            hImg.style.display = 'none';
                            fallbackTitle.style.display = 'block';
                            logDebug("Impossibile trovare il logo.");
                        }
                    };
                    
                    hImg.src = `${imgPaths.shift()}?v=${v}`;
                } else {
                    hImg.style.display = 'none';
                    fallbackTitle.style.display = 'block';
                }

                const tabsContainer = document.getElementById('tabs-container');
                const sezioni = Object.keys(currentConfig).filter(k => 
                    !['site_settings', 'satira_config'].includes(k)
                );

                if (sezioni.length === 0) {
                    showBanner('🔄 Nessuna sezione configurata. Aggiornamento in corso...');
                    return;
                }

                sezioni.forEach((sez, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-t' + (index === 0 ? ' active' : '');
                    let emoji = sez.toLowerCase().includes('pescara') ? '🐬' : '🌍';
                    btn.innerHTML = `${emoji} ${sez}`;
                    btn.onclick = () => loadSez(sez, btn);
                    tabsContainer.appendChild(btn);
                });

                loadSez(sezioni[0], tabsContainer.firstChild);

            } catch (e) {
                logDebug(`Errore Init: ${e.message}`);
                showBanner('🔄 Aggiornamento in corso...');
            }
        }

        async function loadSez(sezKey, btn) {
            document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            const container = document.getElementById('news-container');
            const banner = document.getElementById('update-banner');
            
            showBanner('🔄 Ricerca notizie in corso...');

            try {
                const sezColor = currentConfig[sezKey]?.color || '#a67c00';
                document.documentElement.style.setProperty('--accent', sezColor);

                const paths = [
                    `public/data/news-${sezKey.toLowerCase()}.json?v=${v}`,
                    `data/news-${sezKey.toLowerCase()}.json?v=${v}`
                ];

                let r = null;
                for (let p of paths) {
                    r = await fetch(p);
                    if (r.ok) break;
                }

                if (!r || !r.ok) throw new Error(`Dati news-${sezKey} non trovati`);
                
                const data = await r.json();
                
                if (!data.news || data.news.length === 0) {
                    showBanner('🔄 Aggiornamento in corso... (Mostrando l\'ultima edizione)');
                    return; 
                }

                banner.style.display = 'none';

                if (data.today) document.getElementById('date-now').innerText = data.today;
                
                container.innerHTML = '';
                data.news.forEach(n => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Creazione della card con l'immagine ripristinata in alto
                    card.innerHTML = `
                        ${n.immagine ? `<img src="images/${n.immagine}?v=${v}" onerror="this.onerror=null; this.src='public/images/${n.immagine}?v=${v}';" class="article-img" alt="Immagine articolo">` : ''}
                        <div class="tag-row">
                            <span class="tag">${n.categoria || 'NEWS'} • ${n.fonte || 'Ansa'}</span>
                            ${n.isFake ? '<span class="badge-fake">SATIRA</span>' : ''}
                        </div>
                        <h3>${n.titolo}</h3>
                        <div class="sommario">${n.sommario}</div>
                        <div class="comm-box">
                            <strong>🐬 Il commento:</strong><br>
                            ${n.commento}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch(e) {
                logDebug(`Errore caricamento ${sezKey}: ${e.message}`);
                showBanner('🔄 Aggiornamento in corso...');
            }
        }

        function chiediAdmin() {
            const pwd = prompt("PIN Direttore:");
            fetch(`public/data/auth_info.json?v=${v}`)
                .then(r => r.json())
                .then(d => {
                    if (pwd === d.key) {
                        alert("DIRETTORE IDENTIFICATO.\nConsole Debug attiva.");
                        document.getElementById('error-display').style.display = 'block';
                    } else alert("NEGATO.");
                }).catch(() => alert("Auth offline."));
        }

        window.onload = init;
    </script>
</body>
</html>
