<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>La Voce del Delfino 🐬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unica+One&family=Roboto:wght@400;700&display=swap');
        :root { --delfino-blue: #005f73; }

        .terminal-text { font-family: 'Courier New', Courier, monospace; }
