<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root { --main-color: #005f73; }
        body { margin: 0; background: #fdfaf4; font-family: 'Segoe UI', sans-serif; color: #333; padding: 12px; -webkit-user-select: none; user-select: none; }
        #root { max-width: 850px; margin: auto; }
        img { pointer-events: none; -webkit-touch-callout: none; }
        .header-box { background-color: var(--main-color); border-radius: 20px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15); cursor: pointer; transition: background-color 0.5s; }
        .header-img { width: 100%; height: auto; display: block; }
        .date-bar { text-align: center; padding: 10px; background: rgba(0,0,0,0.15); color: white; font-size: 0.8em; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-t { padding: 12px 24px; border: 2px solid var(--main-color); background: white; color: var(--main-color); border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85em; transition: 0.3s; }
        .btn-t.active { background: var(--main-color); color: white; transform: scale(1.05); }
        .card { background: white; border-radius: 18px; padding: 22px; margin-bottom: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); border: 1px solid #eee; position: relative; }
        .img-n { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
        .badge-fake { background: #ee9b00; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.6em; font-weight: bold; }
        .comm { background: #f0f9fa; padding: 18px; border-left: 6px solid var(--main-color); font-style: italic; border-radius: 0 15px 15px 0; margin-top: 20px; color: #003d4d; }
        #admin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; color: #00ff41; font-family: monospace; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .secret-item { background: rgba(0,255,65,0.05); padding: 12px; margin-bottom: 10px; border: 1px solid #00ff41; border-radius: 8px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="root">
        <div id="admin-overlay">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #00ff41; padding-bottom:10px; margin-bottom:25px;">
                <span>> TERMINALE DIREZIONE (PIANO GIORNALIERO)</span>
                <span style="cursor:pointer; color:#ff4d4d;" onclick="document.getElementById('admin-overlay').style.display='none'">[LOGOUT]</span>
            </div>
            <div id="log-area" style="background:#000; color:#888; font-size:0.85em; padding:15px; max-height:250px; overflow-y:auto; border:1px solid #333; margin-bottom:25px;"></div>
            <div id="secrets-area"></div>
        </div>
        <header class="header-box" onclick="chiediAdmin()"><img id="main-header-img" src="" class="header-img"><div class="date-bar" id="date-now"></div></header>
        <div class="tabs" id="tabs"></div>
        <div id="news-container"></div>
    </div>
    <script>
        let vault = null, config = null;
        async function chiediAdmin() {
            const pwd = prompt("Chiave Direttore:");
            if (!pwd) return;
            const res = await fetch('data/auth_info.json?v=' + Date.now());
            vault = await res.json();
            if (pwd === vault.key) {
                document.getElementById('admin-overlay').style.display = 'block';
                document.getElementById('log-area').innerText = await (await fetch('data/redazione.log?v=' + Date.now())).text();
                let h = ""; vault.secrets.forEach(s => h += `<div class="secret-item">> ${s}</div>`);
                document.getElementById('secrets-area').innerHTML = h;
            } else alert("Negato.");
        }
        async function init() {
            try {
                const res = await fetch('data/active_config.json?v=' + Date.now());
                config = await res.json();
                document.getElementById('main-header-img').src = `images/${config.site_settings.header_img}`;
                
                const activeSezs = Object.keys(config).filter(k => {
                    if (['site_settings', 'satira_config'].includes(k)) return false;
                    return Object.values(config[k]).some(item => item && item.count > 0);
                });

                const tDiv = document.getElementById('tabs');
                if (activeSezs.length === 0) {
                    document.getElementById('news-container').innerHTML = '<p style="text-align:center; padding:100px; color:#999;">Oggi il Delfino è a riposo (Tutti i count a 0).</p>';
                    return;
                }
                activeSezs.forEach(s => {
                    const b = document.createElement('button');
                    b.className = 'btn-t'; b.innerText = s;
                    b.onclick = () => loadSez(s);
                    tDiv.appendChild(b);
                });
                loadSez(activeSezs[0]);
            } catch(e) { document.getElementById('news-container').innerHTML = "Inizializzazione..."; }
        }
        async function loadSez(s) {
            document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.btn-t')).find(b => b.innerText === s);
            if (activeBtn) activeBtn.classList.add('active');
            const r = await fetch(`data/news-${s}.json?v=${Date.now()}`);
            const data = await r.json();
            document.documentElement.style.setProperty('--main-color', data.color);
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            data.news.forEach(n => {
                container.innerHTML += `<div class="card"><div class="tag-row"><span class="tag">${n.categoria}</span>${n.isFake ? '<span class="badge-fake">FAKE NEWS</span>' : ''}</div><img src="images/${n.immagine}" class="img-n"><h3>${n.titolo}</h3><p>${n.sommario}</p><div class="comm">🐬 <strong>Delfino:</strong> ${n.commento}</div></div>`;
            });
        }
        init();
    </script>
</body>
</html>
