<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root { 
            --blu-mare: #005f73; 
            --bg-chiaro: rgba(0, 95, 115, 0.08); 
            --panna: #Faf7f2; 
            --azzurro-pescara: #008cff; 
            --sfondo-meteo: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
        }
        
        body { margin: 0; background: var(--bg-chiaro); background-attachment: fixed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-user-select: none; user-select: none; transition: background 1.2s ease; }
        #app { width: 100%; max-width: 100%; margin: auto; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.15); }
        
        /* --- TESTATA --- */
        .testata { width: 100%; background: var(--blu-mare); line-height: 0; text-align: center; position: relative; }
        .testata img#header-img { width: 100%; height: auto; max-height: 350px; object-fit: cover; display: block; }

        /* --- TIMBRO EDIZIONE (sovrapposto al logo, in basso a sinistra) --- */
        .timbro-edizione {
            display: none; /* mostrato via JS solo se c'è la descrizione */
            position: absolute;
            bottom: 18px;
            left: 20px;
            background: rgba(0, 0, 0, 0.62);
            color: #fff;
            font-size: 13px;
            font-style: italic;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 20px;
            border: 1.5px solid rgba(255,255,255,0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            line-height: 1.4;
            max-width: 70%;
            z-index: 10;
            pointer-events: none;
        }

        .data-oggi { background: #222; color: #fff; text-align: center; padding: 10px; font-size: 14px; font-weight: bold; text-transform: uppercase; line-height: 1.4; }
 
        .info-aggiornamento { 
            font-size: 12px; color: #666; padding: 8px 15px; 
            background: rgba(250, 247, 242, 0.6); 
            border-bottom: 1px dashed #ddd; 
            display: flex; justify-content: space-between; align-items: center; 
            flex-wrap: wrap; gap: 4px;
        }
        .info-aggiornamento .sinistra { display: flex; flex-direction: column; gap: 2px; }
        .prossimo-update { font-size: 11px; color: #999; }
 
        .menu { display: flex; overflow-x: auto; padding: 20px 15px; gap: 12px; scrollbar-width: none; }
        .menu::-webkit-scrollbar { display: none; }
        .tab { white-space: nowrap; padding: 12px 20px; border-radius: 30px; border: 2px solid var(--blu-mare); background: #fff; color: var(--blu-mare); font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .tab.attiva { background: var(--blu-mare); color: #fff; transform: translateY(-2px); }
 
        /* --- LAYOUT GRIGLIA RESPONSIVE --- */
        .notizia-container { padding: 15px 20px 30px 20px; display: grid; grid-template-columns: 1fr; gap: 50px; }
        @media (min-width: 600px) { .notizia-container { grid-template-columns: 1fr 1fr; gap: 40px 24px; } }
        @media (min-width: 1000px) { .notizia-container { grid-template-columns: 1fr 1fr 1fr; gap: 40px 24px; } }
        @media (min-width: 1600px) { .notizia-container { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px 24px; } }
 
        .notizia { position: relative; background: var(--panna); border-radius: 24px; padding: 25px 20px 20px 20px; margin-bottom: 0; }
        .notizia-numero { position: absolute; top: -18px; left: -18px; width: 45px; height: 45px; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px; z-index: 20; border: 4px solid #fff; }
        .etichetta-categoria { position: absolute; top: -12px; right: 20px; padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 20; border: 2px solid #fff; }
        .notizia.vera-box { border: 2px solid var(--azzurro-pescara); box-shadow: 0 10px 25px rgba(0,140,255,0.1); }
        .notizia.vera-box .notizia-numero { background: var(--azzurro-pescara); }
        .etichetta-categoria.vera-label { color: var(--azzurro-pescara); border-color: var(--azzurro-pescara); background: #fff; }
        .notizia.satira-box { border: 2px solid #ff4d4d; background: #fffafa; box-shadow: 0 10px 25px rgba(255,0,0,0.1); }
        .notizia.satira-box .notizia-numero { background: #ff4d4d; }
        .etichetta-categoria.satira-label { color: #ff4d4d; border-color: #ff4d4d; background: #fff; }
        .notizia-img-box { width: 100%; aspect-ratio: 16/9; background: #e9e5df; border-radius: 16px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .notizia-img-box img { width: 100%; height: 100%; object-fit: cover; }
        h2 { margin: 0 0 15px 0; font-size: 24px; line-height: 1.3; color: #2c2c2c; font-weight: 800; }
        .testo { font-size: 16px; line-height: 1.7; color: #4a4a4a; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
        .testo.aperto { -webkit-line-clamp: unset; }
        .leggi-tutto { background: none; border: none; color: var(--blu-mare); font-weight: 800; padding: 12px 0; font-size: 15px; cursor: pointer; text-transform: uppercase; }
        .commento-delfino { background: rgba(255, 255, 255, 0.6); padding: 18px 20px 18px 45px; border-radius: 20px; margin-top: 20px; position: relative; border: 2px dashed #ccc; font-style: italic; }
        .commento-delfino:before { content: "🐬"; position: absolute; left: 12px; top: 16px; font-size: 22px; }
        #terminale { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#0f0; z-index:1000; padding:20px; font-family:monospace; box-sizing:border-box; overflow:auto; }
    </style>
</head>
<body>
    <div id="app">
        <div id="terminale">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #0f0; padding-bottom:10px;">
                <span>> TERMINALE DIREZIONE</span>
                <span onclick="toggleTerminale()" style="color:red; cursor:pointer;">[X] CHIUDI</span>
            </div>
            <pre id="log-content" style="font-size:13px; color:#ccc; margin:20px 0; white-space: pre-wrap;"></pre>
        </div>

        <div class="testata" id="logo-innesco">
            <img id="header-img" src="public/images/default.webp">
            <!-- Timbro edizione sovrapposto al logo, rimpiazza il banner sotto -->
            <div class="timbro-edizione" id="timbro-edizione"></div>
            <div class="data-oggi" id="data-display"></div>
        </div>

        <div class="info-aggiornamento">
            <div class="sinistra">
                <span id="ts-display">...</span>
                <span class="prossimo-update" id="prossimo-display" style="display:none;"></span>
            </div>
            <strong id="meteo-display">🌍 Pescara</strong>
        </div>

        <div class="menu" id="menu-categorie"></div>
        <div id="lista-notizie" class="notizia-container"></div>
    </div>

    <script>
        let clicks = 0, last = 0, pannaGradient = "";

        function toggleTerminale() { document.getElementById('terminale').style.display = 'none'; }

        document.getElementById('logo-innesco').onclick = async () => {
            const ora = Date.now(); if (ora - last > 1000) clicks = 0; clicks++; last = ora;
            if (clicks === 5) {
                const p = prompt("Password:"); if (!p) return;
                const r = await fetch(`public/data/auth_info.json?v=${ora}`); const a = await r.json();
                const hash = Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p)))).map(b => b.toString(16).padStart(2, '0')).join('');
                if (hash === a.check) { 
                    document.getElementById('terminale').style.display = 'block'; 
                    document.getElementById('log-content').innerText = await fetch(`public/data/redazione.log?v=${ora}`).then(res => res.text()); 
                }
            }
        };

        async function preparaMeteo() {
            try {
                // Nuova sintassi API open-meteo (current invece di current_weather)
                const d = await fetch(
                    "https://api.open-meteo.com/v1/forecast?latitude=42.46&longitude=14.21&current=temperature_2m,weather_code"
                ).then(r => r.json());

                const t = Math.round(d.current.temperature_2m);
                const c = d.current.weather_code;
                const h = new Date().getHours();

                let meteo = (c >= 61) ? "pioggia" : (c >= 1 ? "nuvoloso" : "sereno");
                let fascia = (h >= 20 || h < 6) ? "notte" : (h >= 17 ? "tramonto" : (h < 9 ? "alba" : "giorno"));

                if (fascia === "alba")         pannaGradient = meteo === "pioggia" ? "linear-gradient(#757f9a,#d7dde8)" : "linear-gradient(#ffecd2,#fcb69f)";
                else if (fascia === "giorno")  pannaGradient = meteo === "pioggia" ? "linear-gradient(#8b939a,#5b6467)" : (meteo === "nuvoloso" ? "linear-gradient(#cfd9df,#e2ebf0)" : "linear-gradient(#a1c4fd,#c2e9fb)");
                else if (fascia === "tramonto") pannaGradient = meteo === "pioggia" ? "linear-gradient(#4b6cb7,#182848)" : "linear-gradient(#ff7e5f,#feb47b)";
                else                           pannaGradient = meteo === "pioggia" ? "linear-gradient(#141e30,#243b55)" : "linear-gradient(#0f2027,#2c5364)";

                document.getElementById('meteo-display').innerText = `${t}°C 🌤️ Pescara`;
            } catch(e) {
                pannaGradient = "linear-gradient(#a1c4fd,#c2e9fb)";
                document.getElementById('meteo-display').innerText = "🌍 Pescara";
            }
            return pannaGradient;
        }

        async function carica() {
            try {
                const cfg = await fetch(`public/data/active_config.json?v=${Date.now()}`).then(r => r.json());

                if (cfg.site_settings.header_img) 
                    document.getElementById('header-img').src = `public/images/${cfg.site_settings.header_img}`;

                // Timbro edizione al posto del banner
                const desc = cfg.site_settings.descrizione;
                if (desc) {
                    const timbro = document.getElementById('timbro-edizione');
                    timbro.innerText = desc;
                    timbro.style.display = 'block';
                }

                document.getElementById('data-display').innerText = 
                    new Date().toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long' }).toUpperCase();

                const up = cfg.site_settings.last_update || '---';
                document.getElementById('ts-display').innerText = `Aggiornato: ${up}`;

                await preparaMeteo();

                const cat = Object.keys(cfg).filter(k => !['site_settings','satira_config'].includes(k));
                cat.forEach((c, i) => {
                    const b = document.createElement('button');
                    b.className = 'tab' + (i === 0 ? ' attiva' : '');
                    b.innerText = c;
                    b.onclick = () => mostraSezione(c, b);
                    document.getElementById('menu-categorie').appendChild(b);
                });
                if (cat[0]) mostraSezione(cat[0]);

            } catch(e) { console.error(e); }
        }

        async function mostraSezione(s, btn) {
            if (btn) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('attiva'));
                btn.classList.add('attiva');
            }
            const data = await fetch(`public/data/news-${s}.json?v=${Date.now()}`).then(r => r.json());

            // Colore sezione
            const mc = data.color || '#005f73';
            document.documentElement.style.setProperty('--blu-mare', mc);
            const r = parseInt(mc.substring(1,3),16), g = parseInt(mc.substring(3,5),16), b = parseInt(mc.substring(5,7),16);
            const tint = `rgba(${r},${g},${b},0.08)`;
            document.documentElement.style.setProperty('--bg-chiaro', tint);
            document.body.style.background = (s.toLowerCase() === 'pescara') ? pannaGradient : tint;

            // Prossimo aggiornamento
            const prossimoEl = document.getElementById('prossimo-display');
            if (data.prossimo_aggiornamento) {
                prossimoEl.innerText = `Prossimo aggiornamento: ${data.prossimo_aggiornamento}`;
                prossimoEl.style.display = 'block';
            } else {
                prossimoEl.style.display = 'none';
            }

            // Notizie
            const lista = document.getElementById('lista-notizie');
            lista.innerHTML = '';
            data.news.forEach((n, idx) => {
                const isSat = n.is_satira || n.categoria?.toLowerCase() === 'satira';
                lista.innerHTML += `
                    <div class="notizia ${isSat ? 'satira-box' : 'vera-box'}">
                        <div class="notizia-numero">${idx+1}</div>
                        <span class="etichetta-categoria ${isSat ? 'satira-label' : 'vera-label'}">${n.categoria}</span>
                        <div class="notizia-img-box"><img src="public/images/${n.immagine || 'default.webp'}" onerror="this.src='https://placehold.co/600x400?text=News'"></div>
                        <h2>${n.titolo}</h2>
                        <div class="testo" id="t-${idx}">${n.articolo}</div>
                        <button class="leggi-tutto" onclick="const t=document.getElementById('t-${idx}'); t.classList.toggle('aperto'); this.innerText=(t.classList.contains('aperto')?'Nascondi':'Leggi articolo')">Leggi articolo</button>
                        <div class="commento-delfino">${n.commento}</div>
                    </div>`;
            });
        }

        carica();
    </script>
</body>
</html>
