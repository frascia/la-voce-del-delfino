<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root { --blu-mare:#005f73; --panna:#faf7f2; --azzurro-pescara:#008cff; }
        body { margin:0; background:var(--blu-mare); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-user-select:none; user-select:none; transition:background 1.2s ease; }
        #app { width:100%; max-width:100%; margin:auto; background:transparent; min-height:100vh; }

        /* TESTATA */
        .testata { width:100%; background:var(--blu-mare); line-height:0; text-align:center; position:relative; }
        .testata img#header-img { width:100%; height:auto; max-height:350px; object-fit:cover; display:block; }

        /* TIMESTAMP */
        .delfino-timestamp { width:100%; box-sizing:border-box; padding:10px 20px; background:linear-gradient(135deg,rgba(255,243,210,0.9),rgba(255,228,168,0.85)); border-bottom:1.5px solid rgba(180,130,60,0.2); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .dt-tempo { font-size:11px; font-style:italic; color:#7a5c2e; white-space:nowrap; }
        .dt-motto { font-size:12px; font-weight:700; font-style:italic; color:#5a3e1b; text-align:center; flex:1; }

        /* TIMBRO */
        .timbro-edizione { display:none; width:100%; box-sizing:border-box; text-align:center; padding:7px 20px; background:var(--blu-mare); color:rgba(255,255,255,0.85); font-size:12px; font-style:italic; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.1); }

        /* TICKER */
        .ticker-wrap { width:100%; overflow:hidden; background:var(--blu-mare); padding:8px 0; position:relative; opacity:0.85; }
        .ticker-wrap::before,.ticker-wrap::after { content:''; position:absolute; top:0; bottom:0; width:40px; z-index:2; pointer-events:none; }
        .ticker-wrap::before { left:0; background:linear-gradient(to right,var(--blu-mare),transparent); }
        .ticker-wrap::after  { right:0; background:linear-gradient(to left,var(--blu-mare),transparent); }
        .ticker-track { display:flex; width:max-content; animation:ticker-scorre 40s linear infinite; }
        .ticker-track:hover { animation-play-state:paused; }
        @keyframes ticker-scorre { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
        .ticker-item { font-size:11px; font-style:italic; font-weight:600; color:rgba(255,255,255,0.85); white-space:nowrap; padding:0 28px; }
        .ticker-item::after { content:" ✦"; color:rgba(255,255,255,0.35); font-size:9px; }

        /* MENU */
        .menu { display:flex; overflow-x:auto; padding:20px 15px; gap:12px; scrollbar-width:none; }
        .menu::-webkit-scrollbar { display:none; }
        .tab { white-space:nowrap; padding:12px 20px; border-radius:30px; border:2px solid rgba(255,255,255,0.7); background:rgba(255,255,255,0.15); color:#fff; font-weight:bold; font-size:14px; cursor:pointer; transition:0.3s; }
        .tab.attiva { background:rgba(255,255,255,0.9); color:var(--blu-mare); transform:translateY(-2px); }

        /* GRIGLIA */
        .notizia-container { padding:15px 20px 30px; display:grid; grid-template-columns:1fr; gap:50px; }
        @media(min-width:600px)  { .notizia-container { grid-template-columns:1fr 1fr; gap:40px 24px; } }
        @media(min-width:1000px) { .notizia-container { grid-template-columns:1fr 1fr 1fr; gap:40px 24px; } }
        @media(min-width:1600px) { .notizia-container { grid-template-columns:1fr 1fr 1fr 1fr; gap:40px 24px; } }

        /* NOTIZIE */
        .notizia { position:relative; background:var(--panna); border-radius:24px; padding:25px 20px 20px; }
        .notizia-numero { position:absolute; top:-18px; left:-18px; width:45px; height:45px; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:22px; z-index:20; border:4px solid #fff; }
        .etichetta-categoria { position:absolute; top:-12px; right:20px; padding:4px 12px; border-radius:12px; font-size:10px; font-weight:900; text-transform:uppercase; z-index:20; border:2px solid #fff; }
        .notizia.rss-box { border:2px solid var(--azzurro-pescara); box-shadow:0 10px 25px rgba(0,140,255,0.1); }
        .notizia.rss-box .notizia-numero { background:var(--azzurro-pescara); }
        .etichetta-categoria.rss-label { color:var(--azzurro-pescara); border-color:var(--azzurro-pescara); background:#fff; }
        .notizia.gen-box { border:2px solid #ff4d4d; background:#fffafa; box-shadow:0 10px 25px rgba(255,0,0,0.1); }
        .notizia.gen-box .notizia-numero { background:#ff4d4d; }
        .etichetta-categoria.gen-label { color:#ff4d4d; border-color:#ff4d4d; background:#fff; }
        .notizia.personaggio-box { border:2px solid #2d6a4f; background:#f0fff4; box-shadow:0 10px 25px rgba(45,106,79,0.15); }
        .notizia.personaggio-box .notizia-numero { background:#2d6a4f; }
        .etichetta-categoria.personaggio-label { color:#2d6a4f; border-color:#2d6a4f; background:#fff; }
        .notizia-img-box { width:100%; aspect-ratio:16/9; background:#e9e5df; border-radius:16px; overflow:hidden; margin-bottom:20px; }
        .notizia-img-box img { width:100%; height:100%; object-fit:cover; }
        h2 { margin:0 0 15px; font-size:24px; line-height:1.3; color:#2c2c2c; font-weight:800; }
        .testo { font-size:16px; line-height:1.7; color:#4a4a4a; overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; }
        .testo.aperto { -webkit-line-clamp:unset; }
        .leggi-tutto { background:none; border:none; color:var(--blu-mare); font-weight:800; padding:12px 0; font-size:15px; cursor:pointer; text-transform:uppercase; }
        .firma-autore { display:flex; align-items:center; gap:5px; font-size:11px; color:#999; margin-bottom:10px; font-style:italic; }
        .firma-autore .avatar-autore { font-size:16px; }
        .badge-nuovo { display:inline-block; background:#e63946; color:#fff; font-size:9px; font-weight:900; text-transform:uppercase; padding:2px 7px; border-radius:8px; margin-left:8px; vertical-align:middle; animation:pulse-badge 2s ease-in-out infinite; }
        @keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:0.6} }

        /* PERSONAGGIO FRAME */
        .notizia-personaggio-header { display:flex; align-items:center; gap:12px; padding:16px 0 20px; border-bottom:1px dashed rgba(45,106,79,0.25); margin-bottom:16px; }
        .notizia-personaggio-avatar { font-size:40px; line-height:1; }
        .notizia-personaggio-info { flex:1; }
        .notizia-personaggio-nome { font-size:13px; font-weight:800; color:#2d6a4f; }
        .notizia-personaggio-bio { font-size:11px; color:#777; font-style:italic; margin-top:2px; }
        .indicatore-verde { width:10px; height:10px; border-radius:50%; background:#2d6a4f; box-shadow:0 0 6px rgba(45,106,79,0.6); flex-shrink:0; animation:pulse-verde 2s ease-in-out infinite; }
        @keyframes pulse-verde { 0%,100%{box-shadow:0 0 6px rgba(45,106,79,0.6)} 50%{box-shadow:0 0 12px rgba(45,106,79,0.9)} }

        /* COMMENTO FIRMA */
        .commento-firma { background:rgba(255,255,255,0.7); padding:12px 14px 12px 46px; border-radius:16px; margin-top:16px; position:relative; border:2px dashed #ccc; font-style:italic; font-size:13px; color:#555; cursor:pointer; transition:background 0.2s; }
        .commento-firma:hover { background:rgba(255,255,255,0.9); }
        .commento-firma .avatar-firma { position:absolute; left:12px; top:10px; font-size:20px; }
        .commento-firma .nome-firma { font-size:9px; font-weight:800; text-transform:uppercase; color:#bbb; font-style:normal; display:block; margin-bottom:3px; }
        .commento-firma .testo-firma { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .commento-firma.aperto .testo-firma { display:block; -webkit-line-clamp:unset; }
        .firma-toggle { font-size:10px; color:#bbb; float:right; margin-top:2px; transition:transform 0.2s; }
        .commento-firma.aperto .firma-toggle { transform:rotate(180deg); }

        /* BADGE COMMENTI */
        .commenti-header { display:flex; align-items:center; gap:8px; margin-top:14px; cursor:pointer; padding:8px 12px; border-radius:12px; background:rgba(255,255,255,0.35); border:1px solid rgba(0,0,0,0.06); transition:background 0.2s; }
        .commenti-header:hover { background:rgba(255,255,255,0.6); }
        .commenti-count { display:inline-flex; align-items:center; justify-content:center; min-width:22px; height:22px; border-radius:11px; background:var(--azzurro-pescara); color:#fff; font-size:11px; font-weight:900; padding:0 6px; }
        .commenti-count.nuovo { background:#e63946; animation:pulse-badge 2s ease-in-out infinite; }
        .commenti-label { font-size:11px; font-weight:700; color:#888; text-transform:uppercase; flex:1; }
        .commenti-arrow { font-size:10px; color:#bbb; transition:transform 0.2s; }
        .commenti-panel { display:none; flex-direction:column; gap:8px; margin-top:8px; }
        .commenti-panel.aperto { display:flex; }
        .commenti-header.aperto .commenti-arrow { transform:rotate(180deg); }
        .commento-personaggio { background:rgba(255,255,255,0.5); padding:10px 14px 10px 42px; border-radius:14px; position:relative; font-size:13px; color:#444; line-height:1.5; border:1px solid rgba(0,0,0,0.06); cursor:pointer; transition:background 0.2s; }
        .commento-personaggio:hover { background:rgba(255,255,255,0.75); }
        .commento-personaggio .avatar-p { position:absolute; left:10px; top:10px; font-size:18px; }
        .commento-personaggio .nome-p { font-size:9px; font-weight:800; text-transform:uppercase; color:#aaa; display:block; margin-bottom:3px; }
        .commento-personaggio .testo-p { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .commento-personaggio.aperto .testo-p { display:block; -webkit-line-clamp:unset; }
        .commento-toggle { font-size:10px; color:#aaa; float:right; margin-top:2px; transition:transform 0.2s; }
        .commento-personaggio.aperto .commento-toggle { transform:rotate(180deg); }

        /* CHAT */
        .chat-section { padding:20px; margin-top:10px; }
