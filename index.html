<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root { --blu-mare: #005f73; --bg-chiaro: rgba(0, 95, 115, 0.08); }
        
        body { margin: 0; background: var(--bg-chiaro); font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; transition: background 0.6s ease; }
        #app { width: 100%; max-width: 800px; margin: auto; background: #fff; min-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        .testata { width: 100%; background: var(--blu-mare); line-height: 0; cursor: pointer; text-align: center; transition: background-color 0.6s ease; }
        .testata img#header-img { width: 100%; height: auto; max-height: 250px; object-fit: cover; }
        
        .day-banner-box { width: 100%; display: none; background: #000; border-bottom: 2px solid var(--blu-mare); transition: border-color 0.6s ease; }
        .day-banner-box img { width: 100%; max-height: 100px; object-fit: cover; display: block; }

        .descrizione-sito { background: var(--blu-mare); color: rgba(255,255,255,0.9); text-align: center; padding: 10px 15px; font-size: 14px; font-style: italic; border-top: 1px solid rgba(255,255,255,0.1); transition: background-color 0.6s ease; }
        .data-oggi { background: #000; color: #fff; text-align: center; padding: 8px; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        .info-aggiornamento { text-align: right; font-size: 11px; color: #999; padding: 5px 15px; font-family: monospace; border-bottom: 1px solid #eee; }

        .menu { display: flex; overflow-x: auto; padding: 15px; gap: 10px; scrollbar-width: none; background: var(--bg-chiaro); transition: background 0.6s ease; }
        .menu::-webkit-scrollbar { display: none; }
        
        .tab { white-space: nowrap; padding: 10px 18px; border-radius: 25px; border: 1px solid var(--blu-mare); background: #fff; color: var(--blu-mare); font-weight: bold; font-size: 13px; cursor: pointer; transition: all 0.3s ease; }
        .tab.attiva { background: var(--blu-mare); color: #fff; }

        .notizia { padding: 20px; border-bottom: 8px solid var(--bg-chiaro); transition: border-color 0.6s ease; }
        
        /* STILI SPECIALI PER LA SATIRA */
        .notizia.satira-box { border: 1px solid red; border-bottom: 1px solid red; border-radius: 12px; margin: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(255,0,0,0.05); }

        .notizia-img-box { width: 100%; aspect-ratio: 16/9; background: #eee; border-radius: 12px; overflow: hidden; margin-bottom: 15px; position: relative; }
        .notizia-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .etichetta-categoria { position: absolute; top: 12px; left: 12px; background: var(--blu-mare); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.3); letter-spacing: 0.5px; z-index: 10; transition: background-color 0.6s ease; }
        
        /* ETICHETTA ROSSA PER LA SATIRA */
        .etichetta-categoria.satira-label { background: #fff; color: red; border: 1px solid red; box-shadow: 0 4px 6px rgba(255,0,0,0.2); }

        h2 { margin: 0 0 10px 0; font-size: 22px; line-height: 1.2; color: #111; }
        .testo { font-size: 16px; line-height: 1.6; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
        .testo.aperto { -webkit-line-clamp: unset; }
        .leggi-tutto { background: none; border: none; color: var(--blu-mare); font-weight: bold; padding: 10px 0; font-size: 14px; cursor: pointer; transition: color 0.6s ease; }
        
        .commento-delfino { background: var(--bg-chiaro); padding: 15px; border-radius: 12px; margin-top: 15px; position: relative; border-left: 4px solid var(--blu-mare); transition: all 0.6s ease; }
        .commento-delfino:before { content: "🐬"; position: absolute; left: -10px; top: -15px; font-size: 24px; }

        #terminale { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#0f0; z-index:1000; padding:20px; font-family:monospace; box-sizing:border-box; overflow:auto; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Pannello segreto del Direttore -->
        <div id="terminale">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #0f0; padding-bottom:10px;">
                <span>> TERMINALE DIREZIONE</span>
                <span onclick="toggleTerminale()" style="color:red; cursor:pointer;">[X]</span>
            </div>
            <pre id="log-content" style="font-size:12px; color:#aaa; margin:20px 0; white-space: pre-wrap;"></pre>
        </div>

        <div class="testata" id="logo-innesco">
            <img id="header-img" src="public/images/default.webp" alt="La Voce del Delfino" onerror="this.src='https://placehold.co/800x250?text=La+Voce+del+Delfino'">
            
            <div class="day-banner-box" id="banner-box">
                <img id="day-banner" src="" alt="Banner del Giorno" onerror="this.parentElement.style.display='none'">
            </div>

            <div class="descrizione-sito" id="descrizione-display">In attesa del Delfino...</div>
            <div class="data-oggi" id="data-display"></div>
        </div>

        <div class="info-aggiornamento" id="ts-display">In attesa...</div>

        <div class="menu" id="menu-categorie"></div>
        <div id="lista-notizie"></div>
    </div>

    <script>
        let clicks = 0, last = 0;
        function toggleTerminale() { document.getElementById('terminale').style.display = 'none'; }

        document.getElementById('logo-innesco').onclick = async () => {
            const ora = Date.now();
            if (ora - last > 1000) clicks = 0;
            clicks++; last = ora;
            if (clicks === 5) {
                clicks = 0;
                const p = prompt("Password:");
                if (!p) return;
                try {
                    const r = await fetch(`public/data/auth_info.json?v=${ora}`);
                    const a = await r.json();
                    const msgBuffer = new TextEncoder().encode(p);
                    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                    const hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                    
                    if (hash === a.check) {
                        document.getElementById('terminale').style.display = 'block';
                        const log = await fetch(`public/data/redazione.log?v=${ora}`).then(res => res.text());
                        document.getElementById('log-content').innerText = log;
                    }
                } catch(e) { }
            }
        };

        async function carica() {
            try {
                const res = await fetch(`public/data/active_config.json?v=${Date.now()}`);
                const cfg = await res.json();
                
                if (cfg.site_settings.header_img) {
                    document.getElementById('header-img').src = `public/images/${cfg.site_settings.header_img}`;
                }
                
                if (cfg.site_settings.day_banner) {
                    document.getElementById('day-banner').src = `public/images/${cfg.site_settings.day_banner}`;
                    document.getElementById('banner-box').style.display = 'block';
                }

                if (cfg.site_settings.descrizione) {
                    document.getElementById('descrizione-display').innerText = cfg.site_settings.descrizione;
                }
                
                document.getElementById('data-display').innerText = new Date().toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'});
                document.getElementById('ts-display').innerText = `ULTIMO REFRESH: ${cfg.site_settings.last_update || '---'}`;
                
                const cat = Object.keys(cfg).filter(k => !['site_settings','satira_config'].includes(k));
                const menu = document.getElementById('menu-categorie');
                cat.forEach((c, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'tab' + (i === 0 ? ' attiva' : '');
                    btn.innerText = c;
                    btn.onclick = () => mostraSezione(c, btn);
                    menu.appendChild(btn);
                });
                
                if (cat[0]) mostraSezione(cat[0]);
            } catch(e) { 
                document.getElementById('lista-notizie').innerHTML = "<p style='text-align:center; padding:50px;'>Il Delfino sta pescando news fresche...</p>"; 
            }
        }

        async function mostraSezione(s, btn) {
            if (btn) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('attiva'));
                btn.classList.add('attiva');
            }
            try {
                const res = await fetch(`public/data/news-${s}.json?v=${Date.now()}`);
                const data = await res.json();
                
                const mainColor = data.color || '#005f73';
                document.documentElement.style.setProperty('--blu-mare', mainColor);
                
                let r = parseInt(mainColor.substring(1,3), 16);
                let g = parseInt(mainColor.substring(3,5), 16);
                let b = parseInt(mainColor.substring(5,7), 16);
                document.documentElement.style.setProperty('--bg-chiaro', `rgba(${r}, ${g}, ${b}, 0.08)`);
                
                const lista = document.getElementById('lista-notizie');
                lista.innerHTML = '';
                
                data.news.forEach((n, idx) => {
                    const etichetta = n.categoria || 'Speciale';
                    const immagine = n.immagine || 'default.webp';
                    
                    // Rilevamento Satira
                    const isSatira = (n.is_satira || etichetta.toLowerCase() === 'satira');
                    const classeBox = isSatira ? ' satira-box' : '';
                    const classeLabel = isSatira ? ' satira-label' : '';
                    
                    lista.innerHTML += `
                        <div class="notizia${classeBox}">
                            <div class="notizia-img-box">
                                <span class="etichetta-categoria${classeLabel}">${etichetta}</span>
                                <img src="public/images/${immagine}" onerror="this.src='https://placehold.co/600x400?text=Delfino'">
                            </div>
                            <h2>${n.titolo}</h2>
                            <div class="testo" id="t-${idx}">${n.articolo}</div>
                            <button class="leggi-tutto" onclick="const t=document.getElementById('t-${idx}'); t.classList.toggle('aperto'); this.innerText=(t.classList.contains('aperto')?'Chiudi':'Leggi di più')">Leggi di più</button>
                            <div class="commento-delfino"><strong>Delfino:</strong> ${n.commento}</div>
                        </div>`;
                });
            } catch(e) {}
        }
        
        carica();
    </script>
</body>
</html>
