<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>La Voce del Delfino 🐬</title>
    <style>
        :root { 
            --blu-mare: #005f73; 
            --bg-chiaro: rgba(0, 95, 115, 0.08); 
            --panna: #Faf7f2; 
            --azzurro-pescara: #008cff; 
            --sfondo-meteo: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
        }
        
        body { 
            margin: 0; 
            background: var(--bg-chiaro); 
            background-attachment: fixed; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-user-select: none; 
            user-select: none; 
            transition: background 1.2s ease; 
        }

        #app { 
            width: 100%; 
            max-width: 100vw; 
            margin: 0; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            min-height: 100vh; 
            box-shadow: 0 0 40px rgba(0,0,0,0.15);
        }
        
        .testata { 
            width: 100%; 
            background: var(--blu-mare); 
            line-height: 0; 
            text-align: center; 
            position: relative; 
        }

        .testata img#header-img { 
            width: 100%; 
            height: auto; 
            max-height: 480px; 
            object-fit: contain; 
            object-position: top; 
        }

        /* --- IL TIMBRO (Ora si vedrà!) --- */
        #timbro-edizione {
            position: absolute;
            bottom: 40px;
            right: 30px;
            display: none; /* Diventa block tramite JS */
            color: #b90505;
            border: 3px double #b90505;
            padding: 8px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 14px;
            max-width: 250px;
            text-align: center;
            text-transform: uppercase;
            transform: rotate(-10deg);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(3px);
            z-index: 50;
            pointer-events: none;
            line-height: 1.2;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .descrizione-sito { display: none; }
        .data-oggi { background: #222; color: #fff; text-align: center; padding: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        .info-aggiornamento { font-size: 12px; color: #666; padding: 10px 20px; background: rgba(250, 247, 242, 0.6); border-bottom: 1px dashed #ddd; display: flex; justify-content: space-between; align-items: center; }

        .menu { display: flex; overflow-x: auto; padding: 20px 15px; gap: 12px; scrollbar-width: none; }
        .menu::-webkit-scrollbar { display: none; }
        .tab { white-space: nowrap; padding: 12px 20px; border-radius: 30px; border: 2px solid var(--blu-mare); background: #fff; color: var(--blu-mare); font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .tab.attiva { background: var(--blu-mare); color: #fff; transform: translateY(-2px); }

        /* GRIGLIA RESPONSIVE */
        .notizia-container {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 600px) { .notizia-container { grid-template-columns: 1fr 1fr; } }
        @media (min-width: 1100px) { .notizia-container { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1600px) { .notizia-container { grid-template-columns: repeat(4, 1fr); } }

        .notizia { position: relative; background: var(--panna); border-radius: 24px; padding: 25px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .notizia-img-box { width: 100%; aspect-ratio: 16/9; background: #eee; border-radius: 16px; overflow: hidden; margin-bottom: 15px; }
        .notizia-img-box img { width: 100%; height: 100%; object-fit: cover; }
        h2 { margin: 0 0 10px 0; font-size: 20px; color: #111; font-weight: 800; line-height: 1.3; }
        .testo { font-size: 15px; line-height: 1.6; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
        .testo.aperto { -webkit-line-clamp: unset; }
        .leggi-tutto { background: none; border: none; color: var(--blu-mare); font-weight: 800; padding: 10px 0; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        
        .commento-delfino { background: #fff; padding: 15px 15px 15px 40px; border-radius: 15px; margin-top: 15px; border: 1px dashed #ccc; font-style: italic; font-size: 14px; position: relative; }
        .commento-delfino:before { content: "🐬"; position: absolute; left: 10px; top: 12px; font-size: 22px; }

        #terminale { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#0f0; z-index:1000; padding:20px; font-family:monospace; box-sizing:border-box; overflow:auto; }
    </style>
</head>
<body>
    <div id="app">
        <div id="terminale">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #0f0; padding-bottom:10px;">
                <span>> TERMINALE DIREZIONE</span>
                <span onclick="toggleTerminale()" style="color:red; cursor:pointer;">[X] CHIUDI</span>
            </div>
            <pre id="log-content" style="font-size:13px; color:#ccc; margin:20px 0; white-space: pre-wrap;"></pre>
        </div>

        <div class="testata" id="logo-innesco">
            <img id="header-img" src="public/images/default.webp">
            <div id="timbro-edizione"></div>
            <div class="data-oggi" id="data-display"></div>
        </div>

        <div class="info-aggiornamento">
            <span id="ts-display">...</span>
            <strong id="meteo-display">🌍 Pescara</strong>
        </div>

        <div class="menu" id="menu-categorie"></div>
        <div id="lista-notizie" class="notizia-container"></div>
    </div>

    <script>
        let clicks = 0, last = 0, pannaGradient = "";
        function toggleTerminale() { document.getElementById('terminale').style.display = 'none'; }
        document.getElementById('logo-innesco').onclick = async () => {
            const ora = Date.now(); if (ora - last > 1000) clicks = 0; clicks++; last = ora;
            if (clicks === 5) {
                const p = prompt("Password:"); if (!p) return;
                const r = await fetch(`public/data/auth_info.json?v=${ora}`); const a = await r.json();
                const hash = Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p)))).map(b => b.toString(16).padStart(2, '0')).join('');
                if (hash === a.check) { document.getElementById('terminale').style.display = 'block'; document.getElementById('log-content').innerText = await fetch(`public/data/redazione.log?v=${ora}`).then(res => res.text()); }
            }
        };
 
        async function preparaMeteo(update) {
            try {
                let h = new Date().getHours(); if(update && update.includes(',')) h = parseInt(update.split(',')[1].split(':')[0]);
                const d = await fetch("https://api.open-meteo.com/v1/forecast?latitude=42.46&longitude=14.21&current_weather=true").then(r=>r.json());
                const t = Math.round(d.current_weather.temperature), c = d.current_weather.weathercode;
                let m = (c>=45)?"pioggia":(c>=1?"nuvoloso":"sereno"), f = (h>=20||h<6)?"notte":(h>=17?"tramonto":(h>=6&&h<9?"alba":"giorno"));
                if(f==="alba") pannaGradient = m==="pioggia"?"linear-gradient(#757f9a,#d7dde8)":"linear-gradient(#ffecd2,#fcb69f)";
                else if(f==="giorno") pannaGradient = m==="pioggia"?"linear-gradient(#8b939a,#5b6467)":(m==="nuvoloso"?"linear-gradient(#cfd9df,#e2ebf0)":"linear-gradient(#a1c4fd,#c2e9fb)");
                else if(f==="tramonto") pannaGradient = m==="pioggia"?"linear-gradient(#4b6cb7,#182848)":"linear-gradient(#ff7e5f,#feb47b)";
                else pannaGradient = m==="pioggia"?"linear-gradient(#141e30,#243b55)":"linear-gradient(#0f2027,#2c5364)";
                document.getElementById('meteo-display').innerText = `${t}°C Pescara`; return pannaGradient;
            } catch(e) { return "linear-gradient(#a1c4fd,#c2e9fb)"; }
        }
 
        async function carica() {
            try {
                const cfg = await fetch(`public/data/active_config.json?v=${Date.now()}`).then(r=>r.json());
                if (cfg.site_settings.header_img) document.getElementById('header-img').src = `public/images/${cfg.site_settings.header_img}`;
                if (cfg.site_settings.day_banner) { document.getElementById('day-banner').src = `public/images/${cfg.site_settings.day_banner}`; document.getElementById('banner-box').style.display='block'; }
                document.getElementById('descrizione-display').innerText = cfg.site_settings.descrizione;
                document.getElementById('data-display').innerText = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
                const up = cfg.site_settings.last_update || '---'; document.getElementById('ts-display').innerText = `Aggiornato: ${up}`;
                await preparaMeteo(up);
                const cat = Object.keys(cfg).filter(k=>!['site_settings','satira_config'].includes(k));
                cat.forEach((c,i)=>{
                    const b = document.createElement('button'); b.className = 'tab'+(i===0?' attiva':''); b.innerText=c;
                    b.onclick=()=>mostraSezione(c,b); document.getElementById('menu-categorie').appendChild(b);
                });
                if(cat[0]) mostraSezione(cat[0]);
            } catch(e) {}
        }
 
        async function mostraSezione(s, btn) {
            if(btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('attiva')); btn.classList.add('attiva');}
            const data = await fetch(`public/data/news-${s}.json?v=${Date.now()}`).then(r=>r.json());
            const mc = data.color || '#005f73'; document.documentElement.style.setProperty('--blu-mare', mc);
            const r=parseInt(mc.substring(1,3),16), g=parseInt(mc.substring(3,5),16), b=parseInt(mc.substring(5,7),16);
            const tint = `rgba(${r},${g},${b},0.08)`; document.documentElement.style.setProperty('--bg-chiaro', tint);
            document.body.style.background = (s.toLowerCase()==='pescara')? pannaGradient : tint;
            const lista = document.getElementById('lista-notizie'); lista.innerHTML = '';
            data.news.forEach((n,idx)=>{
                const isSat = n.is_satira || n.categoria?.toLowerCase()==='satira';
                lista.innerHTML += `
                    <div class="notizia ${isSat?'satira-box':'vera-box'}">
                        <div class="notizia-numero">${idx+1}</div>
                        <span class="etichetta-categoria ${isSat?'satira-label':'vera-label'}">${n.categoria}</span>
                        <div class="notizia-img-box"><img src="public/images/${n.immagine||'default.webp'}" onerror="this.src='https://placehold.co/600x400?text=News'"></div>
                        <h2>${n.titolo}</h2>
                        <div class="testo" id="t-${idx}">${n.articolo}</div>
                        <button class="leggi-tutto" onclick="const t=document.getElementById('t-${idx}'); t.classList.toggle('aperto'); this.innerText=(t.classList.contains('aperto')?'Nascondi':'Leggi articolo')">Leggi articolo</button>
                        <div class="commento-delfino">${n.commento}</div>
                    </div>`;
            });
        }
        carica();
    </script>
</body>
</html>>
