name: Aggiornamento Dinamico Delfino

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *' 

# Rende esplicito che il bot può scrivere nel repository
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizzazione
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git fetch origin main
          git reset --hard origin/main

      - name: Esecuzione Redazione
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js

      - name: Pubblicazione Risultati
        run: |
          # AGGIUNGIAMO SOLO I DATI, MAI IL WORKFLOW
          git add public/data/*.json public/data/*.log
          
          if git diff --staged --quiet; then
            echo "Nessuna novità da pubblicare."
            exit 0
          fi
          
          git commit -m "🗞️ News Refresh $(date +'%d-%m %H:%M')"
          git push origin main --force