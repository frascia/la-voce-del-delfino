name: Aggiornamento Dinamico Delfino
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *' 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Arrivo in Redazione
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Sincronizzazione Iniziale
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          # Pulizia forzata per evitare conflitti
          git fetch origin main
          git reset --hard origin main

      - name: Setup Node (Senza Cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Qui NON deve esserci la riga 'cache: npm'

      - name: Esecuzione Redazione Segreta
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js
        continue-on-error: true

      - name: Pubblicazione Risultati
        run: |
          git add public/data/*.json public/data/*.log
          
          if git diff --staged --quiet; then
            echo "Nessuna notizia fresca, chiudo la redazione."
            exit 0
          fi
          
          git commit -m "🗞️ News Refresh - $(date +'%Y-%m-%d %H:%M')"
          
          # Forza il push per superare i blocchi precedenti
          git push origin main --force