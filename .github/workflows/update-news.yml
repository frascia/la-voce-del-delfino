name: Aggiornamento Dinamico Delfino
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *' 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Arrivo in Redazione
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurazione Git
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git fetch origin main
          git reset --hard origin main

      - name: Esecuzione Notizie
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js
        # Usiamo il Node già presente nel sistema senza invocare setup-node
        # così non cercherà mai più il lock file.

      - name: Pubblicazione Forzata
        run: |
          git add public/data/*.json public/data/*.log
          if git diff --staged --quiet; then
            echo "Nessuna novità."
            exit 0
          fi
          git commit -m "🗞️ News Refresh $(date +'%d-%m %H:%M')"
          git push origin main --force