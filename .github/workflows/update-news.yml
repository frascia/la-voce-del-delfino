# Questo file dice al bot: "Cerca le notizie e salvale nei file JSON"
name: Aggiornamento Dinamico Delfino

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *' 

permissions:
  contents: write
  workflows: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Arrivo in Redazione
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizzazione Git
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git fetch origin main
          git reset --hard origin/main

      - name: Esecuzione Redazione
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js

      - name: Pubblicazione Forzata
        run: |
          git add public/data/*.json public/data/*.log
          if git diff --staged --quiet; then
            echo "Nessuna novità."
            exit 0
          fi
          git commit -m "🗞️ News Refresh $(date +'%d-%m %H:%M')"
          git push origin main --force