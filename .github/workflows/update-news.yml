name: Aggiornamento Dinamico Delfino
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *' 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Rimosso il parametro cache che causava l'errore del lock file

      - name: Esecuzione Redazione
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js

      - name: Pubblicazione Forzata
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git add public/data/*.json public/data/*.log
          if git diff --staged --quiet; then
            echo "Nessuna novità."
            exit 0
          fi
          git commit -m "🗞️ News Refresh $(date +'%d-%m %H:%M')"
          git push origin main --force