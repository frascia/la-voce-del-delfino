name: Aggiornamento Voce del Delfino
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codice
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installazione Dipendenze (se presenti)
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Esecuzione Redazione
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js
        continue-on-error: true

      - name: Commit e Push Risultati
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git add public/data/*.json public/data/*.log
          git diff --quiet && git diff --staged --quiet || (git commit -m "🗞️ News Refresh" && git push)
