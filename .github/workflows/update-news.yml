name: Aggiornamento Dinamico Delfino
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *' # Ogni 2 ore dalle 7 alle 21
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Arrivo in Redazione
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessario per gestire i conflitti e il rebase

      - name: Preparazione Macchine
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Esecuzione Redazione Segreta
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js
        continue-on-error: true

      - name: Pubblicazione e Risoluzione Conflitti
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git add public/data/*.json public/data/*.log
          
          # Se non ci sono cambiamenti, il bot torna a dormire
          if git diff --staged --quiet; then
            echo "Nessuna notizia fresca, chiudo la redazione."
            exit 0
          fi
          
          git commit -m "🗞️ News Refresh - $(date +'%Y-%m-%d %H:%M')"
          
          # PROTOCOLLO ANTI-INGORGO: 
          # Scarica le tue modifiche e metti le news del bot "sopra" di esse
          git pull --rebase origin main
          
          # Spinta finale
          git push origin main