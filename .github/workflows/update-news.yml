name: Aggiornamento Dinamico Delfino

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *' 

# Ecco la chiave universale: diamo il permesso di scrivere contenuti E workflow
permissions:
  contents: write
  workflows: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Arrivo in Redazione
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizzazione Totale
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git fetch origin main
          git reset --hard origin/main

      - name: Esecuzione Redazione
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js

      - name: Pubblicazione e Spinta
        run: |
          # Aggiungiamo i dati e i log
          git add public/data/*.json public/data/*.log
          
          # Se il bot ha "sentito" modifiche al workflow le aggiungiamo
          # così non ci sono discrepanze
          git add .github/workflows/*.yml
          
          if git diff --staged --quiet; then
            echo "Nessun pesce fresco da vendere."
            exit 0
          fi
          
          git commit -m "🗞️ News Refresh $(date +'%d-%m %H:%M')"
          git push origin main --force