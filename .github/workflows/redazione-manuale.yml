name: "🐬 La Voce del Delfino — Redazione Automatica"

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permette di lanciarlo a mano dal pannello GitHub

# Permessi necessari per permettere al bot di fare "git push"
permissions:
  contents: write

jobs:
  elaborazione:
    runs-on: ubuntu-latest
    
    # Esportiamo gli output per rendere il workflow intelligente
    outputs:
      fase1_success: ${{ steps.fase1.outputs.draft_ready }}
      fase2_success: ${{ steps.fase2.outputs.articles_ready }}

    steps:
      - name: "📂 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Recupera tutta la cronologia per evitare conflitti di push

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "📦 Installazione Dipendenze"
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # -----------------------------------------------------------------------
      # ⚓ FASE 1: FETCH RSS (Si attiva solo con [run-1] nel messaggio)
      # -----------------------------------------------------------------------
      - name: "⚓ FASE 1 — Fetch RSS"
        id: fase1
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/1-fetch-v2.js
          echo "draft_ready=true" >> $GITHUB_OUTPUT

      - name: "💾 Commit Draft (dopo Fase 1)"
        if: steps.fase1.outputs.draft_ready == 'true' && always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Draft creato (Fase 1) [skip ci]" || echo "Nessuna modifica"
          git push

      # -----------------------------------------------------------------------
      # ⚙️ FASE 2: ELABORAZIONE GEMINI (Commenti, Relazioni, Rancori)
      # -----------------------------------------------------------------------
      - name: "⚙️ FASE 2 — Elaborazione Gemini"
        id: fase2
        if: steps.fase1.outputs.draft_ready == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          node scripts/2-elabora-v2.js
          echo "articles_ready=true" >> $GITHUB_OUTPUT

      - name: "💾 Commit Articoli (dopo Fase 2)"
        if: steps.fase2.outputs.articles_ready == 'true' && always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Articoli elaborati (Fase 2) [skip ci]" || echo "Nessuna modifica"
          git push

      # -----------------------------------------------------------------------
      # 🚀 FASE 3: DEPLOY (Pubblicazione Finale)
      # -----------------------------------------------------------------------
      - name: "🚀 FASE 3 — Deploy"
        if: steps.fase2.outputs.articles_ready == 'true'
        run: node scripts/3-deploy-v2.js
