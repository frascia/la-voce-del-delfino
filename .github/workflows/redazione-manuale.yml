name: 🛠️ Redazione Manuale

on:
  push:
    branches:
      - main

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    # Ignora i commit fatti dal bot stesso per evitare loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installazione Dipendenze
        run: npm install

      - name: Configura credenziali git
        run: |
          git config --local user.name "GitHub Action Bot"
          git config --local user.email "action@github.com"

      # -----------------------------------------------------------------------
      # [run-1] → FASE 1 + 2 + 3
      # -----------------------------------------------------------------------
      - name: "⚓ [run-1] FASE 1 — Fetch RSS + Gemini v2"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/1-fetch-v2.js

      - name: "💾 Salvataggio Draft (Auto-commit)"
        if: "contains(github.event.head_commit.message, '[run-1]') && always()"
        run: |
          git add .
          git commit -m "Salvataggio Draft Fase 1 [skip ci]" || echo "Nessuna modifica"
          git push

      - name: "⚙️ [run-1] FASE 2 — Elaborazione v2"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/2-elabora-v2.js

      - name: "🚀 [run-1] FASE 3 — Deploy v2"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # [run-2] → solo FASE 2 + 3
      # -----------------------------------------------------------------------
      - name: "⚙️ [run-2] FASE 2 — Elaborazione v2"
        if: "contains(github.event.head_commit.message, '[run-2]') && !contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/2-elabora-v2.js

      - name: "🚀 [run-2] FASE 3 — Deploy v2"
        if: "contains(github.event.head_commit.message, '[run-2]') && !contains(github.event.head_commit.message, '[run-1]')"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # [run-3] → solo FASE 3
      # -----------------------------------------------------------------------
      - name: "🚀 [run-3] FASE 3 — Deploy v2"
        if: "contains(github.event.head_commit.message, '[run-3]') && !contains(github.event.head_commit.message, '[run-1]') && !contains(github.event.head_commit.message, '[run-2]')"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # Salvataggio Finale — Per rendere permanenti i risultati sul repo
      # -----------------------------------------------------------------------
      - name: "💾 Salvataggio Finale Risultati"
        if: always()
        run: |
          git add .
          git commit -m "Redazione completata: aggiornamento articoli e log [skip ci]" || echo "Nessuna modifica"
          git push
