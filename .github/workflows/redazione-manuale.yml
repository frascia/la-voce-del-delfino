name: 🛠️ Redazione Manuale

on:
  push:
    branches:
      - main

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installazione Dipendenze
        run: npm install

      - name: Configura credenziali git
        run: |
          git config --local user.name "GitHub Action Bot"
          git config --local user.email "action@github.com"

      # -----------------------------------------------------------------------
      # [run-1] → FASE 1 + 2 + 3
      # -----------------------------------------------------------------------
      - name: "⚓ [run-1] FASE 1 — Fetch RSS"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/1-fetch-v2.js

      - name: "💾 Commit Draft (dopo Fase 1)"
        if: "contains(github.event.head_commit.message, '[run-1]') && always()"
        run: |
          git add .
          git commit -m "Draft creato (Fase 1) [skip ci]" || echo "Nessuna modifica"
          git push

      - name: "⚙️ [run-1] FASE 2 — Elaborazione Gemini"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node scripts/2-elabora-v2.js

      - name: "💾 Commit Articoli (dopo Fase 2)"
        if: "contains(github.event.head_commit.message, '[run-1]') && always()"
        run: |
          git add .
          git commit -m "Articoli elaborati (Fase 2) [skip ci]" || echo "Nessuna modifica"
          git push

      - name: "🚀 [run-1] FASE 3 — Deploy"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # [run-2] → solo FASE 2 + 3
      # -----------------------------------------------------------------------
      - name: "⚙️ [run-2] FASE 2 — Elaborazione"
        if: "contains(github.event.head_commit.message, '[run-2]') && !contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node scripts/2-elabora-v2.js

      - name: "💾 Commit Articoli (dopo Fase 2 run-2)"
        if: "contains(github.event.head_commit.message, '[run-2]') && always()"
        run: |
          git add .
          git commit -m "Articoli elaborati (Fase 2 run-2) [skip ci]" || echo "Nessuna modifica"
          git push

      - name: "🚀 [run-2] FASE 3 — Deploy"
        if: "contains(github.event.head_commit.message, '[run-2]') && !contains(github.event.head_commit.message, '[run-1]')"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # [run-3] → solo FASE 3
      # -----------------------------------------------------------------------
      - name: "🚀 [run-3] FASE 3 — Deploy"
        if: "contains(github.event.head_commit.message, '[run-3]') && !contains(github.event.head_commit.message, '[run-1]') && !contains(github.event.head_commit.message, '[run-2]')"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # Chiusura Finale e Deploy Pages
      # -----------------------------------------------------------------------
      - name: "💾 Commit Finale"
        if: always()
        run: |
          git add .
          git commit -m "Workflow completato [skip ci]" || echo "Nessuna modifica"
          git push

      - name: Configurazione Pages
        uses: actions/configure-pages@v4

      - name: Deploy su GitHub Pages
        uses: actions/deploy-pages@v4
