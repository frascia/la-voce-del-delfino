# Questo file dice a GitHub: "Prendi i file così come sono e mettili online"
# NESSUN build, NESSUN React, NESSUN errore.
name: Deploy Sito Statico

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Carica file (Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Carica tutto il progetto
      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4