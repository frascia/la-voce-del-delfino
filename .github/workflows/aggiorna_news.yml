name: Aggiornamento Dinamico La Voce del Delfino

on:
  workflow_dispatch:
    inputs:
      citta_scelta:
        description: 'Città per le news'
        required: true
        default: 'Pescara'
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Installa dipendenze
        run: pip install requests

      - name: Esegui Robot Delfino
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CITY: ${{ github.event.inputs.citta_scelta || 'Pescara' }}
        run: |
          python - <<'EOF'
          import os, requests, json

          api_key = os.environ.get('GEMINI_API_KEY', '')
          citta = os.environ.get('CITY', 'Pescara')

          # News di riserva se Gemini non risponde
          notizie = [{
              "titolo": "Onde di Smeraldo",
              "riassunto": "Il Delfino sta nuotando verso " + citta + ". Presto nuove storie!",
              "data": "Oggi",
              "visivo": "emerald sea waves ghibli style",
              "is_fake": True,
              "commento": "Il mare sussurra segreti.",
              "fonte": "Delfino",
              "link": "#"
          }]

          if api_key:
              print(f"🔑 Chiave trovata, lunghezza: {len(api_key)}")
              try:
                  url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
                  prompt = (
                      f"Sei un cronista dello Studio Ghibli a {citta}. "
                      f"Scrivi 3 news reali e 1 leggenda locale. "
                      f"Rispondi SOLO con un array JSON puro, niente markdown, "
                      f"con i campi: titolo, riassunto, data, visivo, is_fake, commento, fonte, link."
                  )
                  res = requests.post(
                      url,
                      json={"contents": [{"parts": [{"text": prompt}]}]},
                      timeout=30
                  )
                  print(f"📡 Status code: {res.status_code}")
                  print(f"📦 Risposta raw: {res.text[:500]}")
                  testo = res.json()['candidates'][0]['content']['parts'][0]['text']
                  testo = testo.replace('```json', '').replace('```', '').strip()
                  notizie = json.loads(testo)
                  print(f"✅ Gemini ha generato {len(notizie)} notizie per {citta}")
              except Exception as e:
                  print(f"⚠️ Gemini non disponibile, uso news di riserva. ({e})")
          else:
              print("❌ GEMINI_API_KEY non trovata nell'ambiente")

          # Il JSON pubblico contiene SOLO le notizie
          pacchetto = {
              "citta": citta,
              "notizie": notizie
          }

          with open('notizie.json', 'w', encoding='utf-8') as f:
              json.dump(pacchetto, f, indent=4, ensure_ascii=False)

          print("✅ notizie.json salvato correttamente.")
          EOF

      - name: Commit e Push
        run: |
          git config --global user.name "frascia"
          git config --global user.email "frascia@users.noreply.github.com"
          git add notizie.json
          git diff --staged --quiet && echo "Nessuna modifica, skip commit." && exit 0
          git commit -m "🐬 Aggiornamento notizie - $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
