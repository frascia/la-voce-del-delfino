name: Aggiornamento Dinamico La Voce del Delfino

on:
  workflow_dispatch:
    inputs:
      citta_scelta:
        description: 'Città'
        required: true
        default: 'Pescara'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Esegui Robot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATI_PRIVATI: ${{ secrets.DATI_PRIVATI }}
          PASSWORD_SITO: ${{ secrets.PASSWORD_SITO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CITY: ${{ github.event.inputs.citta_scelta }}
        run: |
          python - <<EOF
          import os, requests, json

          api_key = os.environ.get('GEMINI_API_KEY', '')
          citta = os.environ.get('CITY', 'Pescara')
          
          # Notizia di emergenza se Gemini fallisce o manca la chiave
          notizie = [{"titolo": "Onde di Smeraldo", "riassunto": "Il Delfino sta perlustrando le coste. Presto nuove notizie!", "data": "Oggi", "visivo": "emerald sea waves", "is_fake": True, "commento": "Il mare è calmo.", "fonte": "Delfino", "link": "#"}]

          if api_key:
              try:
                  url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
                  prompt = f"Sei un cronista Ghibli a {citta}. Scrivi 3 news reali e 1 leggenda. Rispondi SOLO JSON: [{{'titolo':'','riassunto':'','data':'','visivo':'','is_fake':false,'fonte':'','link':''}}]"
                  res = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=30)
                  testo = res.json()['candidates'][0]['content']['parts'][0]['text']
                  notizie = json.loads(testo.replace('```json', '').replace('```', '').strip())
              except Exception as e:
                  print(f"Errore Gemini: {e}")

          pacchetto = {
              "notizie": notizie,
              "caveau": os.environ.get('DATI_PRIVATI', 'Cassaforte ancora vuota.'),
              "chiave_accesso": os.environ.get('PASSWORD_SITO', 'Delfino2026'),
              "telecomando": os.environ.get('GH_TOKEN', '')
          }

          with open('notizie.json', 'w', encoding='utf-8') as f:
              json.dump(pacchetto, f, indent=4, ensure_ascii=False)
          EOF

      - name: Salva Risultati
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add notizie.json
          git commit -m "Update news" || exit 0
          git push
