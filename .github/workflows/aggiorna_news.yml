name: Aggiornamento Dinamico La Voce del Delfino

on:
  workflow_dispatch:
    inputs:
      citta_scelta:
        description: 'Città'
        required: true
        default: 'Pescara'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Esegui Robot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATI_PRIVATI: ${{ secrets.DATI_PRIVATI }}
          PASSWORD_SITO: ${{ secrets.PASSWORD_SITO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CITY: ${{ github.event.inputs.citta_scelta }}
        run: |
          python - <<EOF
          import os, requests, json

          # Configurazione iniziale
          api_key = os.environ.get('GEMINI_API_KEY', '')
          citta = os.environ.get('CITY', 'Pescara')
          
          # Dati di emergenza (se tutto fallisce, il sito funzionerà comunque con questi)
          notizie = [{
              "titolo": "Onde di Smeraldo", 
              "riassunto": "Il Delfino sta esplorando i fondali. Presto nuove storie!", 
              "data": "Oggi", 
              "visivo": "emerald sea ghibli style", 
              "is_fake": True, 
              "commento": "Il mare sussurra segreti.", 
              "fonte": "Delfino", 
              "link": "#"
          }]

          # Tenta di chiamare Gemini
          if api_key:
              try:
                  url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
                  prompt = f"Sei un cronista Ghibli a {citta}. Scrivi 3 news reali e 1 leggenda. Rispondi SOLO con un array JSON puro, senza blocchi di codice, con i campi: titolo, riassunto, data, visivo, is_fake, fonte, link."
                  
                  res = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=30)
                  res_data = res.json()
                  
                  if 'candidates' in res_data:
                      testo = res_data['candidates'][0]['content']['parts'][0]['text']
                      # Pulizia profonda del testo
                      testo_pulito = testo.replace('```json', '').replace('```', '').strip()
                      notizie = json.loads(testo_pulito)
                      print("News generate con successo!")
                  else:
                      print("Gemini ha risposto con un errore, uso news di emergenza.")
              except Exception as e:
                  print(f"Errore durante l'esecuzione: {e}")

          # Crea il pacchetto finale
          pacchetto = {
              "notizie": notizie,
              "caveau": os.environ.get('DATI_PRIVATI', 'Cassaforte ancora chiusa.'),
              "chiave_accesso": os.environ.get('PASSWORD_SITO', 'Delfino2026'),
              "telecomando": os.environ.get('GH_TOKEN', '')
          }

          # Salva il file notizie.json
          with open('notizie.json', 'w', encoding='utf-8') as f:
              json.dump(pacchetto, f, indent=4, ensure_ascii=False)
          
          print("Processo completato.")
          EOF

      - name: Salva Risultati
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add notizie.json
          git commit -m "Update news" || exit 0
          git push
