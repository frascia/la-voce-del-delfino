name: Aggiornamento Dinamico La Voce del Delfino

on:
  workflow_dispatch:
    inputs:
      citta_scelta:
        description: 'Città'
        required: true
        default: 'Pescara'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Esegui Robot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATI_PRIVATI: ${{ secrets.DATI_PRIVATI }}
          PASSWORD_SITO: ${{ secrets.PASSWORD_SITO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CITY: ${{ github.event.inputs.citta_scelta }}
        run: |
          python - <<EOF
          import os, requests, json

          def genera():
              api_key = os.environ.get('GEMINI_API_KEY')
              citta = os.environ.get('CITY', 'Pescara')
              
              # Caso d'emergenza se manca la chiave
              fallback = [{"titolo": "Onde Silenziose", "riassunto": "Il Delfino sta nuotando nel mare della tranquillità.", "data": "Oggi", "visivo": "peaceful sea", "is_fake": True, "commento": "A presto!"}]
              
              if not api_key:
                  return fallback

              try:
                  url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
                  prompt = f"Sei un cronista Ghibli a {citta}. Scrivi 3 news reali e 1 leggenda. Rispondi SOLO con un array JSON puro, senza markdown, con i campi: titolo, riassunto, data, visivo, is_fake, fonte, link."
                  
                  res = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=30)
                  raw = res.json()['candidates'][0]['content']['parts'][0]['text']
                  return json.loads(raw.replace('```json', '').replace('```', '').strip())
              except:
                  return fallback

          pacchetto = {
              "notizie": genera(),
              "caveau": os.environ.get('DATI_PRIVATI', 'Cassaforte vuota.'),
              "chiave_accesso": os.environ.get('PASSWORD_SITO', 'Delfino2026'),
              "telecomando": os.environ.get('GH_TOKEN', '')
          }

          with open('notizie.json', 'w', encoding='utf-8') as f:
              json.dump(pacchetto, f, indent=4, ensure_ascii=False)
          EOF

      - name: Salva Risultati
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add notizie.json
          git commit -m "Update news" || exit 0
          git push
