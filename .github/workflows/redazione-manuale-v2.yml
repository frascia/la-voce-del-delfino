name: 🛠️ Redazione Manuale v2

on:
  push:
    branches:
      - main

jobs:
  redazione-v2:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installazione Dipendenze
        run: npm install

      - name: Sincronizzazione Git
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git fetch origin main
          git reset --hard origin/main

      # -----------------------------------------------------------------------
      # [run-1] → FASE 1 + 2 + 3
      # -----------------------------------------------------------------------
      - name: "⚓ [run-1] FASE 1 — Fetch RSS + Gemini v2"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/1-fetch-v2.js

      - name: "⚙️ [run-1] FASE 2 — Elaborazione v2"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/2-elabora-v2.js

      - name: "🚀 [run-1] FASE 3 — Deploy v2"
        if: "contains(github.event.head_commit.message, '[run-1]')"
        env:
          WORKFLOW_AUTOMATICO: "false"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # [run-2] → solo FASE 2 + 3 (riusa _draft-v2.json esistente)
      # -----------------------------------------------------------------------
      - name: "⚙️ [run-2] FASE 2 — Elaborazione v2"
        if: "contains(github.event.head_commit.message, '[run-2]') && !contains(github.event.head_commit.message, '[run-1]')"
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/2-elabora-v2.js

      - name: "🚀 [run-2] FASE 3 — Deploy v2"
        if: "contains(github.event.head_commit.message, '[run-2]') && !contains(github.event.head_commit.message, '[run-1]')"
        env:
          WORKFLOW_AUTOMATICO: "false"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # [run-3] → solo FASE 3 (riusa _articles-v2.json esistente)
      # -----------------------------------------------------------------------
      - name: "🚀 [run-3] FASE 3 — Deploy v2"
        if: "contains(github.event.head_commit.message, '[run-3]') && !contains(github.event.head_commit.message, '[run-1]') && !contains(github.event.head_commit.message, '[run-2]')"
        env:
          WORKFLOW_AUTOMATICO: "false"
        run: node scripts/3-deploy-v2.js

      # -----------------------------------------------------------------------
      # Pages deploy — sempre
      # -----------------------------------------------------------------------
      - name: Configurazione Pages
        uses: actions/configure-pages@v4

      - name: Caricamento Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
