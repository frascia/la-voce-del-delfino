name: Aggiorna e Pubblica Delfino

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 7-21/2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  redazione:
    runs-on: ubuntu-latest
    steps:
      - name: Arrivo in Porto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installazione Dipendenze
        run: npm install # Ecco il tuo npm install richiesto!

      - name: Configura Git
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git fetch origin main
          git reset --hard origin/main

      - name: Pesca Notizie
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js

      - name: Salva Dati
        run: |
          git add public/data/*.json public/data/*.log
          if git diff --staged --quiet; then
            echo "Mare calmo, niente di nuovo."
          else
            git commit -m "🗞️ News Refresh $(date +'%d-%m %H:%M')"
            git push origin main --force
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Carica Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Pubblica tutto, inclusa la cartella images con Header.pgp

      - name: Deploy Finale
        id: deployment
        uses: actions/deploy-pages@v4