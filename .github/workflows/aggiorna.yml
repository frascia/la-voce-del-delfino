name: Aggiorna Notizie
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7-21/2 * * *'
jobs:
  aggiorna:
    runs-on: ubuntu-latest
    if: github.actor != 'DelfinoBot'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze
        run: npm install

      - name: Esegui Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_DATA: ${{ secrets.ADMIN_SECRET_DATA }}
        run: node scripts/fetch-news.js

      - name: Push
        run: |
          git config --global user.name "DelfinoBot"
          git config --global user.email "bot@lavocedeldelfino.it"
          git add public/data/
          if git diff --staged --quiet; then
            echo "Niente news da pubblicare."
          else
            git commit -m "🗞️ News $(date +'%d-%m %H:%M')"
            git push origin main
          fi